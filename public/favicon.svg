<svg xmlns:xlink="http://www.w3.org/1999/xlink" id="favicon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256" class="drop-shadow-2xl">
                        <defs>
                            <!-- Gold Gradient -->
                            <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FDE68A"/>
                                <stop offset="50%" stop-color="#F59E0B"/>
                                <stop offset="100%" stop-color="#B45309"/>
                            </linearGradient>
                            <!-- Dark Background Gradient -->
                            <linearGradient id="bg-dark" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#1F2937"/>
                                <stop offset="100%" stop-color="#030712"/>
                            </linearGradient>
                        </defs>
                        
                        <!-- Base Shape (Squircle) -->
                        <rect x="24" y="24" width="464" height="464" rx="120" fill="url(#bg-dark)" stroke="url(#gold)" stroke-width="24"/>
                        
                        <!-- Inner Glow/Detail -->
                        <rect x="48" y="48" width="416" height="416" rx="96" fill="transparent" stroke="#ffffff" stroke-width="2" opacity="0.2"/>

                        <!-- Text -->
                        <text x="50%" y="54%" font-family="Impact, system-ui, sans-serif" font-weight="900" font-size="280" fill="url(#gold)" text-anchor="middle" dominant-baseline="middle" letter-spacing="-5">1%</text>
                    </svg>