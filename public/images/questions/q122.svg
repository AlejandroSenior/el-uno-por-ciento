<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- q122: Balanza - pesos -->
  <rect width="320" height="220" fill="#12121a"/>
  
  <!-- Soporte central -->
  <line x1="160" y1="40" x2="160" y2="80" stroke="#6b6b8a" stroke-width="3"/>
  <polygon points="160,40 150,30 170,30" fill="#6b6b8a"/>
  
  <!-- Barra horizontal (inclinada hacia la derecha = lado derecho más pesado) -->
  <line x1="60" y1="75" x2="260" y2="95" stroke="#e5e5e5" stroke-width="3"/>
  
  <!-- Platillo izquierdo (más alto) -->
  <line x1="60" y1="75" x2="60" y2="120" stroke="#6b6b8a" stroke-width="2"/>
  <ellipse cx="60" cy="125" rx="35" ry="8" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  
  <!-- Objetos lado izquierdo: 2 cubos pequeños -->
  <rect x="45" y="105" width="15" height="15" fill="#4ECDC4" stroke="#333" stroke-width="1"/>
  <rect x="65" y="105" width="15" height="15" fill="#4ECDC4" stroke="#333" stroke-width="1"/>
  <text x="60" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a">2 cubos</text>
  
  <!-- Platillo derecho (más bajo = más pesado) -->
  <line x1="260" y1="95" x2="260" y2="140" stroke="#6b6b8a" stroke-width="2"/>
  <ellipse cx="260" cy="145" rx="35" ry="8" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  
  <!-- Objetos lado derecho: 1 esfera grande -->
  <circle cx="260" cy="125" r="18" fill="#FF6B6B" stroke="#333" stroke-width="1"/>
  <text x="260" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a">1 esfera</text>
  
  <text x="160" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué lado pesa más?
  </text>
</svg>
