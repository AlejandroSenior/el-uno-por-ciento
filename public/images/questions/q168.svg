<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- q168: Tres engranajes encadenados. A gira horario → B antihorario → C horario -->
  <rect width="300" height="200" fill="#12121a"/>
  
  <!-- Engranaje A (izquierda) -->
  <g transform="translate(60,90)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#FF6B6B" stroke-width="2"/>
    <!-- Dientes simplificados -->
    <rect x="-5" y="-40" width="10" height="10" fill="#FF6B6B" rx="1"/>
    <rect x="-5" y="30" width="10" height="10" fill="#FF6B6B" rx="1"/>
    <rect x="30" y="-5" width="10" height="10" fill="#FF6B6B" rx="1"/>
    <rect x="-40" y="-5" width="10" height="10" fill="#FF6B6B" rx="1"/>
    <!-- 4 más en diagonal -->
    <rect x="19" y="-30" width="10" height="10" fill="#FF6B6B" rx="1" transform="rotate(45,24,-25)"/>
    <rect x="-29" y="-30" width="10" height="10" fill="#FF6B6B" rx="1" transform="rotate(-45,-24,-25)"/>
    <rect x="19" y="20" width="10" height="10" fill="#FF6B6B" rx="1" transform="rotate(-45,24,25)"/>
    <rect x="-29" y="20" width="10" height="10" fill="#FF6B6B" rx="1" transform="rotate(45,-24,25)"/>
    <circle cx="0" cy="0" r="5" fill="#FF6B6B"/>
    <text x="0" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FF6B6B" font-weight="bold">A</text>
    <!-- Flecha horaria -->
    <path d="M 15,-20 A 25,25 0 0,1 25,0" fill="none" stroke="#FFD93D" stroke-width="2"/>
    <polygon points="25,0 21,-6 28,-4" fill="#FFD93D"/>
  </g>
  
  <!-- Engranaje B (centro, más pequeño) -->
  <g transform="translate(150,90)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <rect x="-5" y="-33" width="10" height="10" fill="#4ECDC4" rx="1"/>
    <rect x="-5" y="23" width="10" height="10" fill="#4ECDC4" rx="1"/>
    <rect x="23" y="-5" width="10" height="10" fill="#4ECDC4" rx="1"/>
    <rect x="-33" y="-5" width="10" height="10" fill="#4ECDC4" rx="1"/>
    <circle cx="0" cy="0" r="5" fill="#4ECDC4"/>
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ECDC4" font-weight="bold">B</text>
  </g>
  
  <!-- Engranaje C (derecha) -->
  <g transform="translate(240,90)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#4A90D9" stroke-width="2"/>
    <rect x="-5" y="-40" width="10" height="10" fill="#4A90D9" rx="1"/>
    <rect x="-5" y="30" width="10" height="10" fill="#4A90D9" rx="1"/>
    <rect x="30" y="-5" width="10" height="10" fill="#4A90D9" rx="1"/>
    <rect x="-40" y="-5" width="10" height="10" fill="#4A90D9" rx="1"/>
    <rect x="19" y="-30" width="10" height="10" fill="#4A90D9" rx="1" transform="rotate(45,24,-25)"/>
    <rect x="-29" y="-30" width="10" height="10" fill="#4A90D9" rx="1" transform="rotate(-45,-24,-25)"/>
    <rect x="19" y="20" width="10" height="10" fill="#4A90D9" rx="1" transform="rotate(-45,24,25)"/>
    <rect x="-29" y="20" width="10" height="10" fill="#4A90D9" rx="1" transform="rotate(45,-24,25)"/>
    <circle cx="0" cy="0" r="5" fill="#4A90D9"/>
    <text x="0" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4A90D9" font-weight="bold">C</text>
    <text x="0" y="-50" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#FFD93D" font-weight="bold">?</text>
  </g>
  
  <text x="150" y="190" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    Si A gira en sentido horario, ¿en qué sentido gira C?
  </text>
</svg>