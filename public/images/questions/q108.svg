<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <!-- q108: Intersecciones de líneas -->
  <rect width="280" height="240" fill="#12121a"/>
  
  <!-- 4 líneas que se cruzan formando 6 puntos de intersección -->
  <!-- Línea 1: diagonal de arriba-izq a abajo-der -->
  <line x1="40" y1="40" x2="240" y2="180" stroke="#e5e5e5" stroke-width="2.5"/>
  
  <!-- Línea 2: diagonal de arriba-der a abajo-izq -->
  <line x1="240" y1="40" x2="40" y2="180" stroke="#4ECDC4" stroke-width="2.5"/>
  
  <!-- Línea 3: horizontal en el medio -->
  <line x1="30" y1="110" x2="250" y2="110" stroke="#FF6B6B" stroke-width="2.5"/>
  
  <!-- Línea 4: vertical en el medio -->
  <line x1="140" y1="30" x2="140" y2="190" stroke="#FFD93D" stroke-width="2.5"/>
  
  <!-- Puntos de intersección marcados -->
  <circle cx="140" cy="110" r="4" fill="#fbbf24"/>  <!-- Centro: todas se cruzan -->
  <circle cx="90" cy="75" r="3" fill="#fbbf24"/>   <!-- L1 y L3 -->
  <circle cx="190" cy="75" r="3" fill="#fbbf24"/>  <!-- L2 y L3 -->
  <circle cx="90" cy="145" r="3" fill="#fbbf24"/>  <!-- L2 y L3 -->
  <circle cx="190" cy="145" r="3" fill="#fbbf24"/> <!-- L1 y L3 -->
  <circle cx="140" cy="40" r="3" fill="#fbbf24"/>  <!-- L1 y L4 cerca arriba -->
  
  <text x="140" y="225" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos puntos de intersección hay?
  </text>
</svg>
