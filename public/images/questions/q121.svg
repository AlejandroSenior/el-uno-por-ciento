<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q121: Puntos cardinales - distancia al centro -->
  <rect width="300" height="260" fill="#12121a"/>
  
  <!-- Cruz de puntos cardinales -->
  <g transform="translate(150,120)">
    <!-- Centro -->
    <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
    <text x="0" y="-10" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a">Centro</text>
    
    <!-- Norte -->
    <circle cx="0" cy="-70" r="5" fill="#FF6B6B"/>
    <text x="0" y="-77" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">N</text>
    
    <!-- Sur -->
    <circle cx="0" cy="70" r="5" fill="#4ECDC4"/>
    <text x="0" y="85" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">S</text>
    
    <!-- Este -->
    <circle cx="70" cy="0" r="5" fill="#6BCB77"/>
    <text x="70" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">E</text>
    
    <!-- Oeste -->
    <circle cx="-70" cy="0" r="5" fill="#4D96FF"/>
    <text x="-70" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">O</text>
    
    <!-- Punto adicional NE (más cerca) -->
    <circle cx="40" cy="-40" r="5" fill="#FF6FC8"/>
    <text x="40" y="-47" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">P</text>
    
    <!-- Líneas de referencia (grilla sutil) -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#6b6b8a" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#6b6b8a" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <text x="150" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué punto está más cerca del centro?
  </text>
</svg>
