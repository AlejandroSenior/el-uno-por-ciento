<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <!-- q195: Grafo con nodos numerados. Encuentra el camino de Inicio a Fin que suma exactamente 20.
       Camino correcto: 3→5→4→8 = 20 (opción C) -->
  <rect width="320" height="260" fill="#12121a"/>
  
  <text x="160" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">Encuentra el camino de S a F que suma exactamente 20</text>
  
  <!-- Nodos del grafo -->
  <!-- S (Start) -->
  <circle cx="40" cy="120" r="20" fill="#4ECDC4" opacity="0.3" stroke="#4ECDC4" stroke-width="2"/>
  <text x="40" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">S</text>
  
  <!-- Nodo 3 (arriba) -->
  <circle cx="120" cy="55" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="120" y="60" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">3</text>
  
  <!-- Nodo 7 (medio) -->
  <circle cx="120" cy="120" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="120" y="125" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">7</text>
  
  <!-- Nodo 6 (abajo) -->
  <circle cx="120" cy="185" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="120" y="190" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">6</text>
  
  <!-- Nodo 5 -->
  <circle cx="200" cy="55" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="200" y="60" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">5</text>
  
  <!-- Nodo 2 -->
  <circle cx="200" cy="120" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="200" y="125" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">2</text>
  
  <!-- Nodo 9 -->
  <circle cx="200" cy="185" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="200" y="190" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">9</text>
  
  <!-- Nodo 4 -->
  <circle cx="270" cy="80" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="270" y="85" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">4</text>
  
  <!-- Nodo 8 -->
  <circle cx="270" cy="155" r="20" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="270" y="160" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e5e5e5" font-weight="bold">8</text>
  
  <!-- F (Fin) -->
  <circle cx="270" cy="225" r="20" fill="#FF6B6B" opacity="0.3" stroke="#FF6B6B" stroke-width="2"/>
  <text x="270" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">F</text>
  
  <!-- Aristas (flechas) -->
  <!-- S→3 -->
  <line x1="58" y1="108" x2="102" y2="67" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="100,70 105,62 95,65" fill="#6b6b8a"/>
  <!-- S→7 -->
  <line x1="60" y1="120" x2="98" y2="120" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="96,116 102,120 96,124" fill="#6b6b8a"/>
  <!-- S→6 -->
  <line x1="58" y1="132" x2="102" y2="173" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="100,170 105,178 95,175" fill="#6b6b8a"/>
  <!-- 3→5 -->
  <line x1="140" y1="55" x2="178" y2="55" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="176,51 182,55 176,59" fill="#6b6b8a"/>
  <!-- 7→2 -->
  <line x1="140" y1="120" x2="178" y2="120" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="176,116 182,120 176,124" fill="#6b6b8a"/>
  <!-- 7→5 -->
  <line x1="135" y1="103" x2="185" y2="72" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="183,75 188,67 179,70" fill="#6b6b8a"/>
  <!-- 6→9 -->
  <line x1="140" y1="185" x2="178" y2="185" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="176,181 182,185 176,189" fill="#6b6b8a"/>
  <!-- 6→2 -->
  <line x1="135" y1="168" x2="185" y2="137" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="183,140 188,132 179,135" fill="#6b6b8a"/>
  <!-- 5→4 -->
  <line x1="218" y1="63" x2="252" y2="73" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="250,69 256,74 249,77" fill="#6b6b8a"/>
  <!-- 2→8 -->
  <line x1="218" y1="128" x2="252" y2="147" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="250,143 256,150 249,150" fill="#6b6b8a"/>
  <!-- 4→8 -->
  <line x1="270" y1="100" x2="270" y2="133" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="266,131 270,137 274,131" fill="#6b6b8a"/>
  <!-- 8→F -->
  <line x1="270" y1="175" x2="270" y2="203" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="266,201 270,207 274,201" fill="#6b6b8a"/>
  <!-- 9→F -->
  <line x1="218" y1="197" x2="252" y2="215" stroke="#6b6b8a" stroke-width="1.2"/>
  <polygon points="250,211 256,218 249,218" fill="#6b6b8a"/>
  
  <text x="160" y="252" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a">
    Suma solo los nodos intermedios (no S ni F)
  </text>
</svg>