<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <!-- q127: Cubos isométricos 3D - contar cubos ocultos -->
  <rect width="300" height="280" fill="#12121a"/>
  
  <!-- Estructura de cubos en vista isométrica (algunos ocultos) -->
  <g transform="translate(150,140)">
    <!-- Perspectiva isométrica: 30° ángulos -->
    <!-- Capa inferior (base 2x2) -->
    
    <!-- Cubo trasero-izquierdo (capa 1) -->
    <g transform="translate(-60,0)">
      <path d="M 0,-30 L 30,-15 L 30,15 L 0,30 L -30,15 L -30,-15 Z" fill="#d8d8d8" stroke="#333" stroke-width="1.5"/>
      <path d="M 0,-30 L 30,-15 L 0,0 L -30,-15 Z" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
      <path d="M 30,-15 L 30,15 L 0,30 L 0,0 Z" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    </g>
    
    <!-- Cubo trasero-derecho (capa 1) -->
    <g transform="translate(0,-30)">
      <path d="M 0,-30 L 30,-15 L 30,15 L 0,30 L -30,15 L -30,-15 Z" fill="#d8d8d8" stroke="#333" stroke-width="1.5"/>
      <path d="M 0,-30 L 30,-15 L 0,0 L -30,-15 Z" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
      <path d="M 30,-15 L 30,15 L 0,30 L 0,0 Z" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    </g>
    
    <!-- Cubo frontal-izquierdo (capa 1) -->
    <g transform="translate(-60,60)">
      <path d="M 0,-30 L 30,-15 L 30,15 L 0,30 L -30,15 L -30,-15 Z" fill="#d8d8d8" stroke="#333" stroke-width="1.5"/>
      <path d="M 0,-30 L 30,-15 L 0,0 L -30,-15 Z" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
      <path d="M 30,-15 L 30,15 L 0,30 L 0,0 Z" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    </g>
    
    <!-- Cubo frontal-derecho (capa 1) -->
    <g transform="translate(0,30)">
      <path d="M 0,-30 L 30,-15 L 30,15 L 0,30 L -30,15 L -30,-15 Z" fill="#d8d8d8" stroke="#333" stroke-width="1.5"/>
      <path d="M 0,-30 L 30,-15 L 0,0 L -30,-15 Z" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
      <path d="M 30,-15 L 30,15 L 0,30 L 0,0 Z" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    </g>
    
    <!-- Capa superior (2 cubos visibles) -->
    
    <!-- Cubo superior-izquierdo -->
    <g transform="translate(-60,-30)">
      <path d="M 0,-30 L 30,-15 L 30,15 L 0,30 L -30,15 L -30,-15 Z" fill="#b8b8b8" stroke="#333" stroke-width="1.5"/>
      <path d="M 0,-30 L 30,-15 L 0,0 L -30,-15 Z" fill="#e5e5e5" stroke="#333" stroke-width="1.5"/>
      <path d="M 30,-15 L 30,15 L 0,30 L 0,0 Z" fill="#a8a8a8" stroke="#333" stroke-width="1.5"/>
    </g>
    
    <!-- Cubo superior-centro -->
    <g transform="translate(0,-60)">
      <path d="M 0,-30 L 30,-15 L 30,15 L 0,30 L -30,15 L -30,-15 Z" fill="#b8b8b8" stroke="#333" stroke-width="1.5"/>
      <path d="M 0,-30 L 30,-15 L 0,0 L -30,-15 Z" fill="#e5e5e5" stroke="#333" stroke-width="1.5"/>
      <path d="M 30,-15 L 30,15 L 0,30 L 0,0 Z" fill="#a8a8a8" stroke="#333" stroke-width="1.5"/>
    </g>
  </g>
  
  <text x="150" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos cubos hay en total, contando los ocultos?
  </text>
</svg>
