<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- q116: Grilla hexagonal - contar hexágonos de todos los tamaños -->
  <rect width="300" height="300" fill="#12121a"/>
  
  <!-- Estructura hexagonal anidada -->
  <g transform="translate(150,150)">
    <!-- Hexágono exterior (radio ~90) -->
    <polygon points="0,-90 77.94,-45 77.94,45 0,90 -77.94,45 -77.94,-45" 
             fill="none" stroke="#e5e5e5" stroke-width="2.5"/>
    
    <!-- Hexágono medio (radio ~60) -->
    <polygon points="0,-60 51.96,-30 51.96,30 0,60 -51.96,30 -51.96,-30" 
             fill="none" stroke="#4ECDC4" stroke-width="2"/>
    
    <!-- Hexágono pequeño (radio ~30) -->
    <polygon points="0,-30 25.98,-15 25.98,15 0,30 -25.98,15 -25.98,-15" 
             fill="none" stroke="#FFD93D" stroke-width="2"/>
    
    <!-- Líneas radiales que dividen en secciones (creando más hexágonos) -->
    <line x1="0" y1="-90" x2="0" y2="0" stroke="#6b6b8a" stroke-width="1.5"/>
    <line x1="77.94" y1="-45" x2="0" y2="0" stroke="#6b6b8a" stroke-width="1.5"/>
    <line x1="77.94" y1="45" x2="0" y2="0" stroke="#6b6b8a" stroke-width="1.5"/>
    <line x1="0" y1="90" x2="0" y2="0" stroke="#6b6b8a" stroke-width="1.5"/>
    <line x1="-77.94" y1="45" x2="0" y2="0" stroke="#6b6b8a" stroke-width="1.5"/>
    <line x1="-77.94" y1="-45" x2="0" y2="0" stroke="#6b6b8a" stroke-width="1.5"/>
    
    <!-- Hexágonos adicionales intermedios en cada segmento -->
    <polygon points="0,-60 25.98,-45 25.98,-15 0,-30 -25.98,-15 -25.98,-45" 
             fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.6"/>
    <polygon points="51.96,-30 64.95,-7.5 51.96,15 25.98,15 12.99,-7.5 25.98,-30" 
             fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.6"/>
  </g>
  
  <text x="150" y="275" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos hexágonos de todos los tamaños hay?
  </text>
</svg>
