<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <!-- q161: Cuadrícula 6x5 con 13 cuadrados coloreados -->
  <rect width="280" height="240" fill="#12121a"/>
  
  <g transform="translate(20,20)">
    <!-- Grid 6 columnas x 5 filas, cada celda 40x40 -->
    <!-- Filas -->
    <line x1="0" y1="0" x2="240" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="40" x2="240" y2="40" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="80" x2="240" y2="80" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="120" x2="240" y2="120" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="160" x2="240" y2="160" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="200" x2="240" y2="200" stroke="#333" stroke-width="1"/>
    <!-- Columnas -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#333" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="200" stroke="#333" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="200" stroke="#333" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="200" stroke="#333" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#333" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#333" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="200" stroke="#333" stroke-width="1"/>
    
    <!-- 13 cuadrados coloreados en turquesa -->
    <!-- Fila 1: (0,0), (2,0), (4,0) = 3 -->
    <rect x="1" y="1" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="81" y="1" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="161" y="1" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    
    <!-- Fila 2: (1,1), (3,1), (5,1) = 3 -->
    <rect x="41" y="41" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="121" y="41" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="201" y="41" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    
    <!-- Fila 3: (0,2), (2,2) = 2 -->
    <rect x="1" y="81" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="81" y="81" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    
    <!-- Fila 4: (1,3), (3,3), (4,3) = 3 -->
    <rect x="41" y="121" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="121" y="121" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="161" y="121" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    
    <!-- Fila 5: (0,4), (5,4) = 2 -->
    <rect x="1" y="161" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
    <rect x="201" y="161" width="38" height="38" fill="#4ECDC4" opacity="0.6"/>
  </g>
  
  <text x="140" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos cuadrados están coloreados?
  </text>
</svg>