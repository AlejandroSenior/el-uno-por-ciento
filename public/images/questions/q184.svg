<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <!-- q184: Ilusión de Ponzo. Dos líneas horizontales iguales entre líneas convergentes.
       ¿Cuál es más larga? = Son iguales -->
  <rect width="300" height="240" fill="#12121a"/>
  
  <!-- Líneas convergentes (como vías de tren) -->
  <line x1="50" y1="210" x2="150" y2="20" stroke="#6b6b8a" stroke-width="2"/>
  <line x1="250" y1="210" x2="150" y2="20" stroke="#6b6b8a" stroke-width="2"/>
  
  <!-- Travesaños de referencia (como durmientes) -->
  <line x1="80" y1="170" x2="220" y2="170" stroke="#333" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="95" y1="140" x2="205" y2="140" stroke="#333" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="107" y1="115" x2="193" y2="115" stroke="#333" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="117" y1="92" x2="183" y2="92" stroke="#333" stroke-width="0.8" stroke-dasharray="3,3"/>
  
  <!-- Línea A (arriba, parece más larga por la ilusión) -->
  <line x1="118" y1="80" x2="182" y2="80" stroke="#FF6B6B" stroke-width="3.5" stroke-linecap="round"/>
  <text x="107" y="84" text-anchor="end" font-family="sans-serif" font-size="14" fill="#FF6B6B" font-weight="bold">A</text>
  
  <!-- Línea B (abajo, parece más corta) — MISMA longitud: 64px -->
  <line x1="118" y1="175" x2="182" y2="175" stroke="#4ECDC4" stroke-width="3.5" stroke-linecap="round"/>
  <text x="107" y="179" text-anchor="end" font-family="sans-serif" font-size="14" fill="#4ECDC4" font-weight="bold">B</text>
  
  <text x="150" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál línea es más larga, A o B?
  </text>
</svg>