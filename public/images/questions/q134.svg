<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- q134: Encontrar la figura diferente - 7 pentágonos y 1 hexágono -->
  <rect width="320" height="220" fill="#12121a"/>
  
  <!-- Pentágono A -->
  <g transform="translate(50,55)">
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">A</text>
  </g>
  
  <!-- Pentágono B -->
  <g transform="translate(130,55)">
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">B</text>
  </g>
  
  <!-- Hexágono C (la diferente) -->
  <g transform="translate(210,55)">
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">C</text>
  </g>
  
  <!-- Pentágono D -->
  <g transform="translate(290,55)">
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">D</text>
  </g>
  
  <!-- Pentágono E -->
  <g transform="translate(90,145)">
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">E</text>
  </g>
  
  <!-- Pentágono F -->
  <g transform="translate(170,145)">
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">F</text>
  </g>
  
  <!-- Pentágono G -->
  <g transform="translate(250,145)">
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">G</text>
  </g>

  <text x="160" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál tiene un número de lados diferente?
  </text>
</svg>