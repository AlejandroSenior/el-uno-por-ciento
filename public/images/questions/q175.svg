<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q175: Figura irregular sobre cuadrícula de puntos. Área = 7 unidades cuadradas -->
  <rect width="300" height="260" fill="#12121a"/>
  
  <g transform="translate(50,20)">
    <!-- Grid de puntos 7x7, separación 30px -->
    <g fill="#333" opacity="0.6">
      <!-- Row 0 -->
      <circle cx="0" cy="0" r="2"/><circle cx="30" cy="0" r="2"/><circle cx="60" cy="0" r="2"/>
      <circle cx="90" cy="0" r="2"/><circle cx="120" cy="0" r="2"/><circle cx="150" cy="0" r="2"/>
      <circle cx="180" cy="0" r="2"/>
      <!-- Row 1 -->
      <circle cx="0" cy="30" r="2"/><circle cx="30" cy="30" r="2"/><circle cx="60" cy="30" r="2"/>
      <circle cx="90" cy="30" r="2"/><circle cx="120" cy="30" r="2"/><circle cx="150" cy="30" r="2"/>
      <circle cx="180" cy="30" r="2"/>
      <!-- Row 2 -->
      <circle cx="0" cy="60" r="2"/><circle cx="30" cy="60" r="2"/><circle cx="60" cy="60" r="2"/>
      <circle cx="90" cy="60" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="150" cy="60" r="2"/>
      <circle cx="180" cy="60" r="2"/>
      <!-- Row 3 -->
      <circle cx="0" cy="90" r="2"/><circle cx="30" cy="90" r="2"/><circle cx="60" cy="90" r="2"/>
      <circle cx="90" cy="90" r="2"/><circle cx="120" cy="90" r="2"/><circle cx="150" cy="90" r="2"/>
      <circle cx="180" cy="90" r="2"/>
      <!-- Row 4 -->
      <circle cx="0" cy="120" r="2"/><circle cx="30" cy="120" r="2"/><circle cx="60" cy="120" r="2"/>
      <circle cx="90" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="150" cy="120" r="2"/>
      <circle cx="180" cy="120" r="2"/>
      <!-- Row 5 -->
      <circle cx="0" cy="150" r="2"/><circle cx="30" cy="150" r="2"/><circle cx="60" cy="150" r="2"/>
      <circle cx="90" cy="150" r="2"/><circle cx="120" cy="150" r="2"/><circle cx="150" cy="150" r="2"/>
      <circle cx="180" cy="150" r="2"/>
      <!-- Row 6 -->
      <circle cx="0" cy="180" r="2"/><circle cx="30" cy="180" r="2"/><circle cx="60" cy="180" r="2"/>
      <circle cx="90" cy="180" r="2"/><circle cx="120" cy="180" r="2"/><circle cx="150" cy="180" r="2"/>
      <circle cx="180" cy="180" r="2"/>
    </g>
    
    <!-- Polígono irregular: vértices en puntos de la cuadrícula -->
    <!-- Vertices: (0,1)(2,0)(5,0)(5,2)(3,3)(3,2)(1,3)(0,2) en unidades de cuadrícula -->
    <!-- Pick's theorem: I=5, B=6 → A = 5 + 6/2 - 1 = 5+3-1 = 7 ✓ -->
    <polygon 
      points="0,30 60,0 150,0 150,60 90,90 90,60 30,90 0,60"
      fill="#4ECDC4" opacity="0.2" stroke="#4ECDC4" stroke-width="2"/>
    
    <!-- Highlight vertices -->
    <circle cx="0" cy="30" r="4" fill="#4ECDC4"/>
    <circle cx="60" cy="0" r="4" fill="#4ECDC4"/>
    <circle cx="150" cy="0" r="4" fill="#4ECDC4"/>
    <circle cx="150" cy="60" r="4" fill="#4ECDC4"/>
    <circle cx="90" cy="90" r="4" fill="#4ECDC4"/>
    <circle cx="90" cy="60" r="4" fill="#4ECDC4"/>
    <circle cx="30" cy="90" r="4" fill="#4ECDC4"/>
    <circle cx="0" cy="60" r="4" fill="#4ECDC4"/>
    
    <!-- Scale indicator -->
    <line x1="0" y1="210" x2="30" y2="210" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="0" y1="206" x2="0" y2="214" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="30" y1="206" x2="30" y2="214" stroke="#e5e5e5" stroke-width="1.5"/>
    <text x="15" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e5e5e5">1 u</text>
  </g>
  
  <text x="150" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál es el área de la figura? (en unidades²)
  </text>
</svg>