<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <!-- q160: Secuencia de figuras que rotan y cambian color. 
       Paso 1: triángulo rojo apuntando arriba
       Paso 2: triángulo azul apuntando derecha (90° horario)
       Paso 3: triángulo verde apuntando abajo (90° más)
       Paso 4: ? → triángulo amarillo apuntando izquierda
       Opción C es correcta
  -->
  <rect width="320" height="180" fill="#12121a"/>
  
  <!-- Paso 1: triángulo rojo arriba -->
  <g transform="translate(45,80)">
    <polygon points="0,-30 26,15 -26,15" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">1</text>
  </g>
  
  <text x="82" y="83" font-family="sans-serif" font-size="16" fill="#6b6b8a">→</text>
  
  <!-- Paso 2: triángulo azul derecha -->
  <g transform="translate(115,80)">
    <polygon points="30,0 -15,26 -15,-26" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">2</text>
  </g>
  
  <text x="152" y="83" font-family="sans-serif" font-size="16" fill="#6b6b8a">→</text>
  
  <!-- Paso 3: triángulo verde abajo -->
  <g transform="translate(185,80)">
    <polygon points="0,30 -26,-15 26,-15" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">3</text>
  </g>
  
  <text x="222" y="83" font-family="sans-serif" font-size="16" fill="#6b6b8a">→</text>
  
  <!-- Paso 4: ? -->
  <g transform="translate(260,80)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#FFD93D" font-weight="bold">?</text>
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">4</text>
  </g>
  
  <!-- Opciones abajo -->
  <g transform="translate(0,140)">
    <!-- A: triángulo amarillo arriba (incorrecto - no rota) -->
    <g transform="translate(50,15)">
      <polygon points="0,-14 12,7 -12,7" fill="none" stroke="#FFD93D" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">A</text>
    </g>
    <!-- B: triángulo amarillo derecha (incorrecto) -->
    <g transform="translate(130,15)">
      <polygon points="14,0 -7,12 -7,-12" fill="none" stroke="#FFD93D" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">B</text>
    </g>
    <!-- C: triángulo amarillo izquierda (CORRECTO) -->
    <g transform="translate(210,15)">
      <polygon points="-14,0 7,-12 7,12" fill="none" stroke="#FFD93D" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">C</text>
    </g>
    <!-- D: triángulo verde izquierda (color incorrecto) -->
    <g transform="translate(280,15)">
      <polygon points="-14,0 7,-12 7,12" fill="none" stroke="#4ECDC4" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">D</text>
    </g>
  </g>
</svg>