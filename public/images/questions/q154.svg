<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <!-- q154: Gráfico circular con secciones. Las dos más pequeñas suman 15% -->
  <rect width="300" height="280" fill="#12121a"/>
  
  <g transform="translate(150,130)">
    <!-- Sección A: 40% (144°) - azul -->
    <!-- 0° to 144° -->
    <path d="M0,0 L0,-90 A90,90 0 0,1 84.85,-30.78 Z" fill="#4A90D9" opacity="0.8"/>
    <text x="35" y="-55" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e5e5e5" font-weight="bold">40%</text>
    
    <!-- Sección B: 25% (90°) - verde -->
    <!-- 144° to 234° -->
    <path d="M0,0 L84.85,-30.78 A90,90 0 0,1 30.78,84.85 Z" fill="#4ECDC4" opacity="0.8"/>
    <text x="70" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e5e5e5" font-weight="bold">25%</text>
    
    <!-- Sección C: 20% (72°) - amarillo -->
    <!-- 234° to 306° -->
    <path d="M0,0 L30.78,84.85 A90,90 0 0,1 -72.81,52.94 Z" fill="#FFD93D" opacity="0.8"/>
    <text x="-20" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#12121a" font-weight="bold">20%</text>
    
    <!-- Sección D: 10% (36°) - rojo -->
    <!-- 306° to 342° -->
    <path d="M0,0 L-72.81,52.94 A90,90 0 0,0 -55.62,-71.33 Z" fill="#FF6B6B" opacity="0.8"/>
    <text x="-72" y="0" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5" font-weight="bold">10%</text>
    
    <!-- Sección E: 5% (18°) - morado -->
    <!-- 342° to 360° -->
    <path d="M0,0 L-55.62,-71.33 A90,90 0 0,1 0,-90 Z" fill="#b080e0" opacity="0.8"/>
    <text x="-30" y="-72" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e5e5e5" font-weight="bold">5%</text>
  </g>
  
  <!-- Leyenda -->
  <g transform="translate(20,245)">
    <rect x="0" y="0" width="12" height="12" fill="#4A90D9" opacity="0.8"/>
    <text x="16" y="11" font-family="sans-serif" font-size="10" fill="#6b6b8a">A</text>
    <rect x="45" y="0" width="12" height="12" fill="#4ECDC4" opacity="0.8"/>
    <text x="61" y="11" font-family="sans-serif" font-size="10" fill="#6b6b8a">B</text>
    <rect x="90" y="0" width="12" height="12" fill="#FFD93D" opacity="0.8"/>
    <text x="106" y="11" font-family="sans-serif" font-size="10" fill="#6b6b8a">C</text>
    <rect x="135" y="0" width="12" height="12" fill="#FF6B6B" opacity="0.8"/>
    <text x="151" y="11" font-family="sans-serif" font-size="10" fill="#6b6b8a">D</text>
    <rect x="180" y="0" width="12" height="12" fill="#b080e0" opacity="0.8"/>
    <text x="196" y="11" font-family="sans-serif" font-size="10" fill="#6b6b8a">E</text>
  </g>
  
  <text x="150" y="275" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuánto suman las dos secciones más pequeñas?
  </text>
</svg>