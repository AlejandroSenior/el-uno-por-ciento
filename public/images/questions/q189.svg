<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q189: Escalera de Penrose (imposible). Los escalones parecen subir infinitamente.
       Pregunta: ¿Cuántos pisos sube en total? Respuesta: Ninguno / Es imposible -->
  <rect width="300" height="260" fill="#12121a"/>
  
  <g transform="translate(150,120)">
    <!-- Escalera de Penrose simplificada - vista isométrica -->
    <!-- Cuatro tramos de escaleras formando un bucle imposible -->
    
    <!-- Tramo 1: izquierda, subiendo hacia arriba-derecha -->
    <polygon points="-70,30 -70,10 -50,0 -50,20" fill="#4A90D9" opacity="0.3" stroke="#4A90D9" stroke-width="1.5"/>
    <polygon points="-50,20 -50,0 -30,-10 -30,10" fill="#4A90D9" opacity="0.35" stroke="#4A90D9" stroke-width="1.5"/>
    <polygon points="-30,10 -30,-10 -10,-20 -10,0" fill="#4A90D9" opacity="0.4" stroke="#4A90D9" stroke-width="1.5"/>
    <polygon points="-10,0 -10,-20 10,-30 10,-10" fill="#4A90D9" opacity="0.45" stroke="#4A90D9" stroke-width="1.5"/>
    
    <!-- Tramo 2: arriba, subiendo hacia la derecha -->
    <polygon points="10,-10 10,-30 30,-40 30,-20" fill="#4ECDC4" opacity="0.3" stroke="#4ECDC4" stroke-width="1.5"/>
    <polygon points="30,-20 30,-40 50,-30 50,-10" fill="#4ECDC4" opacity="0.35" stroke="#4ECDC4" stroke-width="1.5"/>
    <polygon points="50,-10 50,-30 70,-20 70,0" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="1.5"/>
    
    <!-- Tramo 3: derecha, subiendo hacia abajo-izquierda -->
    <polygon points="70,0 70,-20 50,-10 50,10" fill="#FF6B6B" opacity="0.3" stroke="#FF6B6B" stroke-width="1.5"/>
    <polygon points="50,10 50,-10 30,0 30,20" fill="#FF6B6B" opacity="0.35" stroke="#FF6B6B" stroke-width="1.5"/>
    <polygon points="30,20 30,0 10,10 10,30" fill="#FF6B6B" opacity="0.4" stroke="#FF6B6B" stroke-width="1.5"/>
    
    <!-- Tramo 4: abajo, "subiendo" de vuelta al inicio (la parte imposible) -->
    <polygon points="10,30 10,10 -10,20 -10,40" fill="#FFD93D" opacity="0.3" stroke="#FFD93D" stroke-width="1.5"/>
    <polygon points="-10,40 -10,20 -30,30 -30,50" fill="#FFD93D" opacity="0.35" stroke="#FFD93D" stroke-width="1.5"/>
    <polygon points="-30,50 -30,30 -50,40 -50,60" fill="#FFD93D" opacity="0.4" stroke="#FFD93D" stroke-width="1.5"/>
    <!-- Conexión imposible: este escalón "vuelve" al nivel del primero -->
    <polygon points="-50,60 -50,40 -70,50 -70,30" fill="#FFD93D" opacity="0.45" stroke="#FFD93D" stroke-width="1.5"/>
    
    <!-- Flechas de dirección -->
    <polygon points="-80,20 -75,15 -75,25" fill="#e5e5e5" opacity="0.5"/>
    <text x="-85" y="25" text-anchor="end" font-family="sans-serif" font-size="9" fill="#e5e5e5" opacity="0.6">Inicio</text>
    
    <!-- Símbolo de infinito sutil en el centro -->
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#6b6b8a" opacity="0.3">∞</text>
  </g>
  
  <text x="150" y="235" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    Si subes por esta escalera sin parar,
  </text>
  <text x="150" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿cuántos pisos habrás subido tras dar una vuelta completa?
  </text>
</svg>