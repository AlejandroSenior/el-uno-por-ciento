<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <!-- q169: Patrón de números triangulares en puntos.
       Fila 1: 1 punto
       Fila 2: 2 puntos
       Fila 3: 3 puntos
       Fila 4: 4 puntos
       Fila 5: 5 puntos
       Siguiente: 6 puntos
  -->
  <rect width="280" height="240" fill="#12121a"/>
  
  <!-- Fila 1: 1 punto -->
  <circle cx="140" cy="25" r="8" fill="#4ECDC4"/>
  
  <!-- Fila 2: 2 puntos -->
  <circle cx="125" cy="55" r="8" fill="#4ECDC4"/>
  <circle cx="155" cy="55" r="8" fill="#4ECDC4"/>
  
  <!-- Fila 3: 3 puntos -->
  <circle cx="110" cy="85" r="8" fill="#4ECDC4"/>
  <circle cx="140" cy="85" r="8" fill="#4ECDC4"/>
  <circle cx="170" cy="85" r="8" fill="#4ECDC4"/>
  
  <!-- Fila 4: 4 puntos -->
  <circle cx="95" cy="115" r="8" fill="#4ECDC4"/>
  <circle cx="125" cy="115" r="8" fill="#4ECDC4"/>
  <circle cx="155" cy="115" r="8" fill="#4ECDC4"/>
  <circle cx="185" cy="115" r="8" fill="#4ECDC4"/>
  
  <!-- Fila 5: 5 puntos -->
  <circle cx="80" cy="145" r="8" fill="#4ECDC4"/>
  <circle cx="110" cy="145" r="8" fill="#4ECDC4"/>
  <circle cx="140" cy="145" r="8" fill="#4ECDC4"/>
  <circle cx="170" cy="145" r="8" fill="#4ECDC4"/>
  <circle cx="200" cy="145" r="8" fill="#4ECDC4"/>
  
  <!-- Fila 6: ? puntos (punteados) -->
  <circle cx="65" cy="175" r="8" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="95" cy="175" r="8" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="125" cy="175" r="8" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="155" cy="175" r="8" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="185" cy="175" r="8" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="215" cy="175" r="8" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,2"/>
  
  <!-- Números a la derecha -->
  <text x="230" y="30" font-family="sans-serif" font-size="13" fill="#6b6b8a">1</text>
  <text x="230" y="60" font-family="sans-serif" font-size="13" fill="#6b6b8a">2</text>
  <text x="230" y="90" font-family="sans-serif" font-size="13" fill="#6b6b8a">3</text>
  <text x="230" y="120" font-family="sans-serif" font-size="13" fill="#6b6b8a">4</text>
  <text x="230" y="150" font-family="sans-serif" font-size="13" fill="#6b6b8a">5</text>
  <text x="230" y="180" font-family="sans-serif" font-size="16" fill="#FFD93D" font-weight="bold">?</text>
  
  <text x="140" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos puntos tendrá la siguiente fila?
  </text>
</svg>