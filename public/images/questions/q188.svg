<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 260" width="280" height="260">
  <!-- q188: Pentágono con todas las diagonales (pentáculo/pentágrama). ¿Cuántos triángulos hay? = 10
       5 puntas externas + 5 triángulos internos formados por los lados del pentágono interior y diagonales -->
  <rect width="280" height="260" fill="#12121a"/>
  
  <g transform="translate(140,120)">
    <!-- Pentágono con todas sus diagonales dibujadas = pentácula -->
    <!-- Vértices del pentágono regular, radio 90 -->
    <!-- V0 (arriba): (0,-90) -->
    <!-- V1 (der-arriba): (85.6,-27.8) → redondeado (86,-28) -->
    <!-- V2 (der-abajo): (52.9,72.8) → (53,73) -->
    <!-- V3 (izq-abajo): (-52.9,72.8) → (-53,73) -->
    <!-- V4 (izq-arriba): (-85.6,-27.8) → (-86,-28) -->
    
    <!-- Lados del pentágono -->
    <line x1="0" y1="-90" x2="86" y2="-28" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="86" y1="-28" x2="53" y2="73" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="53" y1="73" x2="-53" y2="73" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="-53" y1="73" x2="-86" y2="-28" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="-86" y1="-28" x2="0" y2="-90" stroke="#4ECDC4" stroke-width="2"/>
    
    <!-- Diagonales -->
    <line x1="0" y1="-90" x2="53" y2="73" stroke="#FF6B6B" stroke-width="1.5"/>
    <line x1="0" y1="-90" x2="-53" y2="73" stroke="#FF6B6B" stroke-width="1.5"/>
    <line x1="86" y1="-28" x2="-53" y2="73" stroke="#FF6B6B" stroke-width="1.5"/>
    <line x1="86" y1="-28" x2="-86" y2="-28" stroke="#FF6B6B" stroke-width="1.5"/>
    <line x1="53" y1="73" x2="-86" y2="-28" stroke="#FF6B6B" stroke-width="1.5"/>
    
    <!-- Vértices -->
    <circle cx="0" cy="-90" r="4" fill="#FFD93D"/>
    <circle cx="86" cy="-28" r="4" fill="#FFD93D"/>
    <circle cx="53" cy="73" r="4" fill="#FFD93D"/>
    <circle cx="-53" cy="73" r="4" fill="#FFD93D"/>
    <circle cx="-86" cy="-28" r="4" fill="#FFD93D"/>
  </g>
  
  <text x="140" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos triángulos hay en esta figura?
  </text>
</svg>