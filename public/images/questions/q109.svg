<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q109: Diagrama de Venn - 3 círculos - contar regiones -->
  <rect width="300" height="260" fill="#12121a"/>
  
  <!-- Tres círculos que se superponen -->
  <!-- Círculo A (izquierda) -->
  <circle cx="110" cy="120" r="60" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  <text x="70" y="125" font-family="sans-serif" font-size="12" fill="#FF6B6B" font-weight="bold">A</text>
  
  <!-- Círculo B (derecha) -->
  <circle cx="190" cy="120" r="60" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  <text x="230" y="125" font-family="sans-serif" font-size="12" fill="#4ECDC4" font-weight="bold">B</text>
  
  <!-- Círculo C (arriba) -->
  <circle cx="150" cy="80" r="60" fill="none" stroke="#FFD93D" stroke-width="2.5"/>
  <text x="150" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFD93D" font-weight="bold">C</text>
  
  <!-- Regiones numeradas sutilmente para verificación (7 regiones internas + exterior = 8 total, pero preguntamos por regiones distintas formadas = 7) -->
  <!-- 1: Solo A (izq) -->
  <circle cx="85" cy="140" r="2" fill="#6b6b8a"/>
  <!-- 2: Solo B (der) -->
  <circle cx="215" cy="140" r="2" fill="#6b6b8a"/>
  <!-- 3: Solo C (arriba) -->
  <circle cx="150" cy="55" r="2" fill="#6b6b8a"/>
  <!-- 4: A∩B no C (centro-bajo) -->
  <circle cx="150" cy="135" r="2" fill="#6b6b8a"/>
  <!-- 5: A∩C no B (izq-arriba) -->
  <circle cx="120" cy="90" r="2" fill="#6b6b8a"/>
  <!-- 6: B∩C no A (der-arriba) -->
  <circle cx="180" cy="90" r="2" fill="#6b6b8a"/>
  <!-- 7: A∩B∩C (centro) -->
  <circle cx="150" cy="105" r="2" fill="#fbbf24"/>
  
  <text x="150" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántas regiones distintas se forman?
  </text>
</svg>
