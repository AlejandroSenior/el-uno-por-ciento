<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" width="340" height="220">
  <!-- q106: Gráfico de barras -->
  <rect width="340" height="220" fill="#12121a"/>
  
  <!-- Ejes -->
  <line x1="40" y1="30" x2="40" y2="170" stroke="#6b6b8a" stroke-width="2"/>
  <line x1="40" y1="170" x2="310" y2="170" stroke="#6b6b8a" stroke-width="2"/>
  
  <!-- Marcas en eje Y (cada 20 unidades) -->
  <text x="25" y="175" font-family="sans-serif" font-size="10" fill="#6b6b8a">0</text>
  <text x="18" y="135" font-family="sans-serif" font-size="10" fill="#6b6b8a">20</text>
  <text x="18" y="95" font-family="sans-serif" font-size="10" fill="#6b6b8a">40</text>
  <text x="18" y="55" font-family="sans-serif" font-size="10" fill="#6b6b8a">60</text>
  <text x="18" y="35" font-family="sans-serif" font-size="10" fill="#6b6b8a">70</text>
  
  <!-- Barras: valores 15, 45, 30, 60, 25 -->
  <!-- Barra A: 15 -->
  <rect x="60" y="140" width="40" height="30" fill="#FF6B6B"/>
  <text x="80" y="190" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">A</text>
  
  <!-- Barra B: 45 -->
  <rect x="115" y="80" width="40" height="90" fill="#4ECDC4"/>
  <text x="135" y="190" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">B</text>
  
  <!-- Barra C: 30 -->
  <rect x="170" y="110" width="40" height="60" fill="#FFD93D"/>
  <text x="190" y="190" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">C</text>
  
  <!-- Barra D: 60 (la más alta) -->
  <rect x="225" y="50" width="40" height="120" fill="#6BCB77"/>
  <text x="245" y="190" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">D</text>
  
  <!-- Barra E: 25 -->
  <rect x="280" y="120" width="40" height="50" fill="#4D96FF"/>
  <text x="300" y="190" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">E</text>
  
  <text x="170" y="212" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Diferencia entre el valor más alto y el más bajo?
  </text>
</svg>
