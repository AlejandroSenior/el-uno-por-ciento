<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <!-- q082: Triangle with internal lines — count all triangles (answer: 9) -->
  <rect width="300" height="280" fill="#12121a"/>

  <!-- Main triangle: top(150,20), BL(20,250), BR(280,250) -->
  <polygon points="150,20 20,250 280,250" fill="none" stroke="#e5e5e5" stroke-width="2.5"/>

  <!-- Medians from each vertex to midpoint of opposite side -->
  <!-- Midpoint of BL-BR = (150,250) -->
  <line x1="150" y1="20" x2="150" y2="250" stroke="#e5e5e5" stroke-width="2"/>

  <!-- Midpoint of top-BR = (215,135) -->
  <line x1="20" y1="250" x2="215" y2="135" stroke="#e5e5e5" stroke-width="2"/>

  <!-- Midpoint of top-BL = (85,135) -->
  <line x1="280" y1="250" x2="85" y2="135" stroke="#e5e5e5" stroke-width="2"/>

  <text x="150" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos triángulos ves en la figura?
  </text>
</svg>
