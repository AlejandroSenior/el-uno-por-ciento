<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <!-- q140: Secuencia de formas: triángulo(3) → cuadrado(4) → pentágono(5) → ? -->
  <rect width="320" height="160" fill="#12121a"/>
  
  <!-- Triángulo (3 lados) -->
  <g transform="translate(50,70)">
    <polygon points="0,-25 22,15 -22,15" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  </g>
  
  <!-- Flecha -->
  <line x1="80" y1="70" x2="100" y2="70" stroke="#6b6b8a" stroke-width="1.5"/>
  <polygon points="100,66 108,70 100,74" fill="#6b6b8a"/>
  
  <!-- Cuadrado (4 lados) -->
  <g transform="translate(130,70)">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  </g>
  
  <!-- Flecha -->
  <line x1="160" y1="70" x2="180" y2="70" stroke="#6b6b8a" stroke-width="1.5"/>
  <polygon points="180,66 188,70 180,74" fill="#6b6b8a"/>
  
  <!-- Pentágono (5 lados) -->
  <g transform="translate(210,70)">
    <polygon points="0,-25 24,-8 15,20 -15,20 -24,-8" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  </g>
  
  <!-- Flecha -->
  <line x1="240" y1="70" x2="260" y2="70" stroke="#6b6b8a" stroke-width="1.5"/>
  <polygon points="260,66 268,70 260,74" fill="#6b6b8a"/>
  
  <!-- Signo de interrogación -->
  <g transform="translate(290,70)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#FFD93D" font-weight="bold">?</text>
  </g>
  
  <text x="160" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué figura sigue en la secuencia?
  </text>
</svg>