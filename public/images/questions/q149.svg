<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- q149: Forma L y 4 rotaciones. B es la correcta rotación 90° horario -->
  <rect width="320" height="220" fill="#12121a"/>
  
  <!-- Figura original: forma L -->
  <g transform="translate(160,10)">
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFD93D">Original</text>
    <rect x="-25" y="15" width="20" height="50" fill="none" stroke="#FFD93D" stroke-width="2.5"/>
    <rect x="-5" y="45" width="30" height="20" fill="none" stroke="#FFD93D" stroke-width="2.5"/>
    <!-- Unir -->
    <line x1="-5" y1="45" x2="-5" y2="65" stroke="#12121a" stroke-width="3"/>
  </g>
  
  <line x1="10" y1="80" x2="310" y2="80" stroke="#333" stroke-width="1"/>
  <text x="160" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">Rotación 90° en sentido horario:</text>
  
  <!-- A: rotada 180° (incorrecta) -->
  <g transform="translate(50,155)">
    <rect x="5" y="-25" width="20" height="50" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <rect x="-25" y="-25" width="30" height="20" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <line x1="5" y1="-25" x2="5" y2="-5" stroke="#12121a" stroke-width="3"/>
    <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">A</text>
  </g>
  
  <!-- B: rotada 90° horario (correcta) -->
  <g transform="translate(130,155)">
    <rect x="-25" y="-20" width="50" height="20" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <rect x="-25" y="0" width="20" height="30" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <line x1="-25" y1="0" x2="-5" y2="0" stroke="#12121a" stroke-width="3"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">B</text>
  </g>
  
  <!-- C: rotada 270° (incorrecta) -->
  <g transform="translate(210,155)">
    <rect x="-25" y="0" width="50" height="20" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <rect x="5" y="-30" width="20" height="30" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <line x1="5" y1="0" x2="25" y2="0" stroke="#12121a" stroke-width="3"/>
    <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">C</text>
  </g>
  
  <!-- D: reflejada (incorrecta) -->
  <g transform="translate(290,155)">
    <rect x="5" y="-35" width="20" height="50" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <rect x="-25" y="-5" width="30" height="20" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <line x1="5" y1="-5" x2="5" y2="15" stroke="#12121a" stroke-width="3"/>
    <text x="0" y="32" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">D</text>
  </g>
  
  <text x="160" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál es la rotación correcta?
  </text>
</svg>