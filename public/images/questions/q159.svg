<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q159: Cruz/desarrollo de un cubo para doblar -->
  <rect width="300" height="260" fill="#12121a"/>
  
  <!-- Cruz del cubo (6 caras de 40x40) -->
  <g transform="translate(150,125)">
    <!-- Cara superior -->
    <rect x="-20" y="-100" width="40" height="40" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <text x="0" y="-74" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ECDC4">Arriba</text>
    
    <!-- Cara central (frente) -->
    <rect x="-20" y="-60" width="40" height="40" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    
    <!-- Cara derecha -->
    <rect x="20" y="-60" width="40" height="40" fill="none" stroke="#FF6B6B" stroke-width="2"/>
    
    <!-- Cara izquierda -->
    <rect x="-60" y="-60" width="40" height="40" fill="none" stroke="#FFD93D" stroke-width="2"/>
    
    <!-- Cara inferior (abajo del frente) -->
    <rect x="-20" y="-20" width="40" height="40" fill="none" stroke="#4A90D9" stroke-width="2"/>
    
    <!-- Cara trasera (abajo de todo) -->
    <rect x="-20" y="20" width="40" height="40" fill="none" stroke="#b080e0" stroke-width="2"/>
    
    <!-- Líneas punteadas de doblez -->
    <line x1="-20" y1="-60" x2="20" y2="-60" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="-20" y1="20" x2="20" y2="20" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="-20" y1="-60" x2="-20" y2="-20" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="20" y1="-60" x2="20" y2="-20" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
    
    <!-- Flechas de plegado -->
    <path d="M -50,-40 C -65,-40 -65,-80 -50,-80" fill="none" stroke="#6b6b8a" stroke-width="1"/>
    <polygon points="-50,-80 -55,-75 -45,-75" fill="#6b6b8a"/>
    
    <path d="M 50,-40 C 65,-40 65,-80 50,-80" fill="none" stroke="#6b6b8a" stroke-width="1"/>
    <polygon points="50,-80 55,-75 45,-75" fill="#6b6b8a"/>
  </g>
  
  <text x="150" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    Si doblas esta figura por las líneas, ¿qué forma 3D obtienes?
  </text>
</svg>