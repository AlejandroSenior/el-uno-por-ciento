<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="260" height="240">
  <!-- q105: Dado estándar - cara opuesta -->
  <rect width="260" height="240" fill="#12121a"/>
  
  <!-- Dado en perspectiva isométrica mostrando caras 1, 2, 3 -->
  <g transform="translate(130,120)">
    <!-- Cara superior (1 punto) -->
    <path d="M 0,-60 L 60,-30 L 0,0 L -60,-30 Z" fill="#e5e5e5" stroke="#333" stroke-width="2"/>
    <circle cx="0" cy="-30" r="4" fill="#333"/>
    
    <!-- Cara izquierda (2 puntos) -->
    <path d="M -60,-30 L 0,0 L 0,70 L -60,40 Z" fill="#ccc" stroke="#333" stroke-width="2"/>
    <circle cx="-40" cy="5" r="4" fill="#333"/>
    <circle cx="-20" cy="35" r="4" fill="#333"/>
    
    <!-- Cara derecha (3 puntos) -->
    <path d="M 60,-30 L 0,0 L 0,70 L 60,40 Z" fill="#d8d8d8" stroke="#333" stroke-width="2"/>
    <circle cx="40" cy="5" r="4" fill="#333"/>
    <circle cx="30" cy="20" r="4" fill="#333"/>
    <circle cx="20" cy="35" r="4" fill="#333"/>
  </g>
  
  <text x="130" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué número hay en la cara opuesta al 3?
  </text>
</svg>
