<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- q146: Matriz 3x3 con patrón. Cada fila: círculo, cuadrado, triángulo. Cada columna: rojo, azul, verde. Falta cuadrado azul -->
  <rect width="300" height="300" fill="#12121a"/>
  
  <!-- Grid lines -->
  <line x1="20" y1="100" x2="280" y2="100" stroke="#333" stroke-width="1"/>
  <line x1="20" y1="190" x2="280" y2="190" stroke="#333" stroke-width="1"/>
  <line x1="107" y1="15" x2="107" y2="275" stroke="#333" stroke-width="1"/>
  <line x1="193" y1="15" x2="193" y2="275" stroke="#333" stroke-width="1"/>
  
  <!-- Fila 1: círculo rojo, cuadrado verde, triángulo azul -->
  <circle cx="63" cy="57" r="22" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  <rect x="128" y="35" width="44" height="44" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  <polygon points="236,35 214,79 258,79" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  
  <!-- Fila 2: triángulo verde, círculo azul, cuadrado rojo -->
  <polygon points="63,110 41,154 85,154" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  <circle cx="150" cy="145" r="22" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <rect x="214" y="123" width="44" height="44" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  
  <!-- Fila 3: cuadrado azul (=?), triángulo rojo, círculo verde -->
  <g transform="translate(63,235)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#FFD93D" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#FFD93D" font-weight="bold">?</text>
  </g>
  <polygon points="150,198 128,242 172,242" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  <circle cx="236" cy="235" r="22" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  
  <text x="150" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué figura y color van en la casilla con '?'?
  </text>
</svg>