<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <!-- q155: Cuadrícula de números con patrón. Falta el 15. 
       Patrón: cada fila suma 30.
       Fila 1: 5, 10, 15
       Fila 2: 8, 12, 10
       Fila 3: 3, 12, ?=15
  -->
  <rect width="280" height="240" fill="#12121a"/>
  
  <!-- Título -->
  <text x="140" y="25" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b8a">Cada fila suma lo mismo</text>
  
  <!-- Grid -->
  <g transform="translate(50,40)">
    <!-- Celdas -->
    <rect x="0" y="0" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="60" y="0" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="120" y="0" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    
    <rect x="0" y="50" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="60" y="50" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="120" y="50" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    
    <rect x="0" y="100" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="60" y="100" width="60" height="50" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="120" y="100" width="60" height="50" fill="#1a1a2e" stroke="#FFD93D" stroke-width="2.5"/>
    
    <!-- Números fila 1 -->
    <text x="30" y="32" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">5</text>
    <text x="90" y="32" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">10</text>
    <text x="150" y="32" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">15</text>
    
    <!-- Números fila 2 -->
    <text x="30" y="82" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">8</text>
    <text x="90" y="82" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">12</text>
    <text x="150" y="82" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">10</text>
    
    <!-- Números fila 3 -->
    <text x="30" y="132" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">3</text>
    <text x="90" y="132" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">12</text>
    <text x="150" y="132" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#FFD93D" font-weight="bold">?</text>
    
    <!-- Sumas al lado -->
    <text x="195" y="32" text-anchor="start" font-family="sans-serif" font-size="14" fill="#4ECDC4">= 30</text>
    <text x="195" y="82" text-anchor="start" font-family="sans-serif" font-size="14" fill="#4ECDC4">= 30</text>
    <text x="195" y="132" text-anchor="start" font-family="sans-serif" font-size="14" fill="#4ECDC4">= ?</text>
  </g>
  
  <text x="140" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué número falta en la cuadrícula?
  </text>
</svg>