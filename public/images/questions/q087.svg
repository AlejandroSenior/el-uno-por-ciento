<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- q087: Fraser spiral illusion — concentric arc segments that appear to spiral -->
  <rect width="300" height="300" fill="#12121a"/>

  <g transform="translate(150,150)">
    <!-- Concentric circles with alternating tilted segments creating the illusion -->
    <!-- We draw arcs in alternating black/white bands with slight offsets -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#555" stroke-width="18" stroke-dasharray="25,25" stroke-dashoffset="0"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#ccc" stroke-width="18" stroke-dasharray="25,25" stroke-dashoffset="25"/>

    <circle cx="0" cy="0" r="95" fill="none" stroke="#555" stroke-width="16" stroke-dasharray="21,21" stroke-dashoffset="5"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#ccc" stroke-width="16" stroke-dasharray="21,21" stroke-dashoffset="26"/>

    <circle cx="0" cy="0" r="72" fill="none" stroke="#555" stroke-width="14" stroke-dasharray="18,18" stroke-dashoffset="9"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#ccc" stroke-width="14" stroke-dasharray="18,18" stroke-dashoffset="27"/>

    <circle cx="0" cy="0" r="51" fill="none" stroke="#555" stroke-width="12" stroke-dasharray="14,14" stroke-dashoffset="3"/>
    <circle cx="0" cy="0" r="51" fill="none" stroke="#ccc" stroke-width="12" stroke-dasharray="14,14" stroke-dashoffset="17"/>

    <circle cx="0" cy="0" r="33" fill="none" stroke="#555" stroke-width="10" stroke-dasharray="10,10" stroke-dashoffset="2"/>
    <circle cx="0" cy="0" r="33" fill="none" stroke="#ccc" stroke-width="10" stroke-dasharray="10,10" stroke-dashoffset="12"/>

    <circle cx="0" cy="0" r="18" fill="none" stroke="#555" stroke-width="8" stroke-dasharray="7,7" stroke-dashoffset="1"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ccc" stroke-width="8" stroke-dasharray="7,7" stroke-dashoffset="8"/>
  </g>

  <text x="150" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Ves una espiral o círculos concéntricos?
  </text>
</svg>
