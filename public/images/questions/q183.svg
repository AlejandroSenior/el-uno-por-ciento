<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="300" height="220">
  <!-- q183: Ecuaciones con símbolos. ★+●=8, ★-●=2 → ★=5, ●=3. Si ★×●-■=8, ¿■=? → 5×3-■=8 → ■=7 -->
  <rect width="300" height="220" fill="#12121a"/>
  
  <!-- Ecuación 1: ★ + ● = 8 -->
  <g transform="translate(150,40)">
    <!-- Estrella -->
    <polygon points="0,-16 4,-6 15,-6 6,1 10,12 0,5 -10,12 -6,1 -15,-6 -4,-6" fill="#FFD93D" opacity="0.6" stroke="#FFD93D" stroke-width="1"/>
    <text x="30" y="4" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">+</text>
    <!-- Círculo -->
    <circle cx="55" cy="-2" r="13" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="2"/>
    <text x="85" y="4" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">=</text>
    <text x="110" y="6" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5" font-weight="bold">8</text>
  </g>
  
  <!-- Ecuación 2: ★ - ● = 2 -->
  <g transform="translate(150,85)">
    <polygon points="0,-16 4,-6 15,-6 6,1 10,12 0,5 -10,12 -6,1 -15,-6 -4,-6" fill="#FFD93D" opacity="0.6" stroke="#FFD93D" stroke-width="1"/>
    <text x="30" y="4" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">−</text>
    <circle cx="55" cy="-2" r="13" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="2"/>
    <text x="85" y="4" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">=</text>
    <text x="110" y="6" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5" font-weight="bold">2</text>
  </g>
  
  <!-- Línea separadora -->
  <line x1="40" y1="115" x2="260" y2="115" stroke="#6b6b8a" stroke-width="0.5" stroke-dasharray="4,4"/>
  
  <!-- Ecuación 3: ★ × ● - ■ = 8 -->
  <g transform="translate(150,155)">
    <polygon points="0,-16 4,-6 15,-6 6,1 10,12 0,5 -10,12 -6,1 -15,-6 -4,-6" fill="#FFD93D" opacity="0.6" stroke="#FFD93D" stroke-width="1"/>
    <text x="27" y="4" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">×</text>
    <circle cx="50" cy="-2" r="13" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="2"/>
    <text x="72" y="4" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">−</text>
    <!-- Cuadrado misterio -->
    <rect x="83" y="-14" width="24" height="24" fill="#FF6B6B" opacity="0.3" stroke="#FF6B6B" stroke-width="2"/>
    <text x="95" y="6" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e5e5e5" font-weight="bold">?</text>
    <text x="125" y="4" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5">=</text>
    <text x="150" y="6" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e5e5e5" font-weight="bold">8</text>
  </g>
  
  <text x="150" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál es el valor del cuadrado rojo?
  </text>
</svg>