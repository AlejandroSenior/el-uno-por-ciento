<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" width="360" height="180">
  <!-- q102: Intruso visual - flechas -->
  <rect width="360" height="180" fill="#12121a"/>
  
  <!-- Flechas a la derecha (8) -->
  <g fill="#e5e5e5">
    <polygon points="30,40 50,40 50,30 70,50 50,70 50,60 30,60"/>
    <polygon points="100,40 120,40 120,30 140,50 120,70 120,60 100,60"/>
    <polygon points="170,40 190,40 190,30 210,50 190,70 190,60 170,60"/>
    <polygon points="240,40 260,40 260,30 280,50 260,70 260,60 240,60"/>
    
    <polygon points="30,110 50,110 50,100 70,120 50,140 50,130 30,130"/>
    <polygon points="100,110 120,110 120,100 140,120 120,140 120,130 100,130"/>
    <polygon points="240,110 260,110 260,100 280,120 260,140 260,130 240,130"/>
    <polygon points="310,110 330,110 330,100 350,120 330,140 330,130 310,130"/>
  </g>
  
  <!-- Flecha a la izquierda (1) - destacada -->
  <polygon points="210,110 190,110 190,100 170,120 190,140 190,130 210,130" fill="#fbbf24"/>
  
  <text x="180" y="172" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿En qué dirección apunta la flecha diferente?
  </text>
</svg>
