<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <!-- q174: Estructura isométrica de cubos apilados. ¿Cuántos cubos hay? = 12 -->
  <rect width="320" height="260" fill="#12121a"/>
  
  <g transform="translate(160,30)">
    <!-- Isometric cube unit: top face, left face, right face -->
    <!-- Each cube ~40px wide isometric -->
    
    <!-- Helper: a single isometric cube at grid position (col, row, layer) -->
    <!-- dx=20 per col, dy=12 per col (iso-x), dy=12 per row, dx=-20 per row (iso-y), dz=-24 per layer -->
    
    <!-- Layer 0 (bottom): 3x3 minus corners = full 3x2 = 6 cubes -->
    <!-- Row 0: 3 cubes -->
    <!-- Cube (0,0,0) -->
    <g transform="translate(-60,96)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4A90D9" opacity="0.4" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
    </g>
    <!-- Cube (1,0,0) -->
    <g transform="translate(-20,84)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4A90D9" opacity="0.4" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
    </g>
    <!-- Cube (2,0,0) -->
    <g transform="translate(20,72)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4A90D9" opacity="0.4" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
    </g>
    
    <!-- Row 1: 3 cubes -->
    <!-- Cube (0,1,0) -->
    <g transform="translate(-80,108)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4A90D9" opacity="0.4" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
    </g>
    <!-- Cube (1,1,0) -->
    <g transform="translate(-40,96)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4ECDC4" opacity="0.25" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4ECDC4" opacity="0.15" stroke="#4ECDC4" stroke-width="1"/>
    </g>
    <!-- Cube (2,1,0) -->
    <g transform="translate(0,84)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4A90D9" opacity="0.4" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4A90D9" opacity="0.25" stroke="#4A90D9" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
    </g>
    
    <!-- Layer 1 (middle): 2x2 = 4 cubes -->
    <!-- Cube (0,0,1) -->
    <g transform="translate(-60,72)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4ECDC4" opacity="0.25" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4ECDC4" opacity="0.15" stroke="#4ECDC4" stroke-width="1"/>
    </g>
    <!-- Cube (1,0,1) -->
    <g transform="translate(-20,60)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4ECDC4" opacity="0.25" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4ECDC4" opacity="0.15" stroke="#4ECDC4" stroke-width="1"/>
    </g>
    <!-- Cube (0,1,1) -->
    <g transform="translate(-80,84)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#4ECDC4" opacity="0.4" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#4ECDC4" opacity="0.25" stroke="#4ECDC4" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#4ECDC4" opacity="0.15" stroke="#4ECDC4" stroke-width="1"/>
    </g>
    <!-- Cube (1,1,1) -->
    <g transform="translate(-40,72)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#FF6B6B" opacity="0.4" stroke="#FF6B6B" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#FF6B6B" opacity="0.25" stroke="#FF6B6B" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="1"/>
    </g>
    
    <!-- Layer 2 (top): 2 cubes -->
    <!-- Cube (0,0,2) -->
    <g transform="translate(-60,48)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#FFD93D" opacity="0.4" stroke="#FFD93D" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#FFD93D" opacity="0.25" stroke="#FFD93D" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#FFD93D" opacity="0.15" stroke="#FFD93D" stroke-width="1"/>
    </g>
    <!-- Cube (0,1,2) -->
    <g transform="translate(-80,60)">
      <polygon points="0,0 20,-12 40,0 20,12" fill="#FFD93D" opacity="0.4" stroke="#FFD93D" stroke-width="1"/>
      <polygon points="0,0 0,24 20,36 20,12" fill="#FFD93D" opacity="0.25" stroke="#FFD93D" stroke-width="1"/>
      <polygon points="20,12 20,36 40,24 40,0" fill="#FFD93D" opacity="0.15" stroke="#FFD93D" stroke-width="1"/>
    </g>
  </g>
  
  <text x="160" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos cubos forman esta estructura?
  </text>
</svg>