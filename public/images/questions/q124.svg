<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <!-- q124: Reloj analógico - ángulo a las 3:40 -->
  <rect width="260" height="260" fill="#12121a"/>
  
  <g transform="translate(130,120)">
    <!-- Círculo del reloj -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#e5e5e5" stroke-width="3"/>
    
    <!-- Marcas horarias -->
    <circle cx="0" cy="-70" r="3" fill="#6b6b8a"/>  <!-- 12 -->
    <circle cx="70" cy="0" r="3" fill="#6b6b8a"/>   <!-- 3 -->
    <circle cx="0" cy="70" r="3" fill="#6b6b8a"/>   <!-- 6 -->
    <circle cx="-70" cy="0" r="3" fill="#6b6b8a"/>  <!-- 9 -->
    
    <!-- Números principales -->
    <text x="0" y="-55" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5">12</text>
    <text x="60" y="5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5">3</text>
    <text x="0" y="65" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5">6</text>
    <text x="-60" y="5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5">9</text>
    
    <!-- Manecilla de minutos (40 min = 240° desde 12, apunta hacia 8) -->
    <!-- 40 min = 40/60 * 360 = 240° clockwise desde 12 -->
    <!-- x = 0 + 55*sin(240°) = -47.63, y = 0 - 55*cos(240°) = 27.5 -->
    <line x1="0" y1="0" x2="-47.6" y2="27.5" stroke="#4ECDC4" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Manecilla de hora (3:40 = 3 + 40/60 horas = 3.667 horas) -->
    <!-- 3.667 * 30° = 110° desde 12 -->
    <!-- x = 0 + 40*sin(110°) = 37.59, y = 0 - 40*cos(110°) = 13.68 -->
    <line x1="0" y1="0" x2="37.6" y2="13.7" stroke="#FF6B6B" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Centro -->
    <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
  </g>
  
  <text x="130" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué ángulo forman las manecillas a las 3:40?
  </text>
</svg>
