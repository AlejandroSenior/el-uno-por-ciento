<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- q119: Conteo de colores - figuras rojas -->
  <rect width="320" height="200" fill="#12121a"/>
  
  <!-- Figuras rojas (5) -->
  <circle cx="40" cy="50" r="16" fill="#FF6B6B"/>
  <rect x="100" y="34" width="32" height="32" fill="#FF6B6B"/>
  <polygon points="200,50 185,75 215,75" fill="#FF6B6B"/>
  <circle cx="270" cy="50" r="16" fill="#FF6B6B"/>
  <rect x="60" y="120" width="32" height="32" fill="#FF6B6B"/>
  
  <!-- Figuras azules (4) -->
  <circle cx="160" cy="55" r="16" fill="#4D96FF"/>
  <rect x="230" y="120" width="32" height="32" fill="#4D96FF"/>
  <polygon points="130,145 115,170 145,170" fill="#4D96FF"/>
  <circle cx="200" cy="140" r="16" fill="#4D96FF"/>
  
  <!-- Figuras verdes (3) -->
  <polygon points="280,125 265,150 295,150" fill="#6BCB77"/>
  <rect x="155" y="120" width="32" height="32" fill="#6BCB77"/>
  <circle cx="30" cy="140" r="16" fill="#6BCB77"/>
  
  <text x="160" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántas figuras rojas hay?
  </text>
</svg>
