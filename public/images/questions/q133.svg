<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- q133: Contar círculos azules entre figuras mezcladas -->
  <rect width="320" height="200" fill="#12121a"/>
  
  <!-- Círculos azules (6 total) -->
  <circle cx="45" cy="40" r="16" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="160" cy="35" r="16" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="275" cy="50" r="16" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="80" cy="130" r="16" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="200" cy="145" r="16" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <circle cx="260" cy="120" r="16" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  
  <!-- Cuadrados rojos (4 total) -->
  <rect x="95" y="30" width="28" height="28" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  <rect x="210" y="25" width="28" height="28" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  <rect x="30" y="80" width="28" height="28" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  <rect x="140" y="120" width="28" height="28" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  
  <!-- Triángulos verdes (3 total) -->
  <polygon points="130,80 115,108 145,108" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  <polygon points="240,85 225,113 255,113" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  <polygon points="60,160 45,185 75,185" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
  
  <!-- Círculos rojos (distractor - 2) -->
  <circle cx="185" cy="85" r="16" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  <circle cx="295" cy="160" r="16" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
  
  <text x="160" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos círculos azules hay?
  </text>
</svg>