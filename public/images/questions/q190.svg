<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q190: 5 líneas en posición general dividen el plano. ¿Máximo de regiones? = 16
       Fórmula: 1 + n + n(n-1)/2 = 1 + 5 + 10 = 16 -->
  <rect width="300" height="260" fill="#12121a"/>
  
  <!-- Área visible -->
  <rect x="15" y="15" width="270" height="210" fill="none" stroke="#333" stroke-width="1" rx="4"/>
  
  <!-- 5 líneas en posición general (ninguna paralela, no 3 concurrentes) -->
  <clipPath id="clip190">
    <rect x="15" y="15" width="270" height="210"/>
  </clipPath>
  
  <g clip-path="url(#clip190)">
    <!-- Línea 1: casi horizontal -->
    <line x1="10" y1="100" x2="290" y2="130" stroke="#4ECDC4" stroke-width="2"/>
    <!-- Línea 2: diagonal NE-SO -->
    <line x1="20" y1="200" x2="280" y2="40" stroke="#FF6B6B" stroke-width="2"/>
    <!-- Línea 3: diagonal NO-SE -->
    <line x1="30" y1="30" x2="270" y2="210" stroke="#FFD93D" stroke-width="2"/>
    <!-- Línea 4: casi vertical -->
    <line x1="130" y1="10" x2="110" y2="230" stroke="#4A90D9" stroke-width="2"/>
    <!-- Línea 5: otra diagonal -->
    <line x1="15" y1="160" x2="285" y2="50" stroke="#e5e5e5" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Números en algunas regiones para sugerir que se cuentan -->
  <text x="60" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a" opacity="0.5">1</text>
  <text x="170" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a" opacity="0.5">2</text>
  <text x="240" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a" opacity="0.5">3</text>
  <text x="80" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a" opacity="0.5">?</text>
  <text x="200" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a" opacity="0.5">?</text>
  <text x="140" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b8a" opacity="0.5">?</text>
  
  <text x="150" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿En cuántas regiones máximo dividen 5 líneas rectas un plano?
  </text>
</svg>