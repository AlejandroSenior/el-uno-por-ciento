<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <!-- q148: 5 líneas que se cruzan formando 10 intersecciones -->
  <rect width="300" height="250" fill="#12121a"/>
  
  <!-- 5 líneas dispuestas para maximizar intersecciones (10 = C(5,2)) -->
  <!-- Línea 1: horizontal alta -->
  <line x1="20" y1="60" x2="280" y2="80" stroke="#FF6B6B" stroke-width="2"/>
  
  <!-- Línea 2: horizontal baja -->
  <line x1="20" y1="180" x2="280" y2="160" stroke="#4ECDC4" stroke-width="2"/>
  
  <!-- Línea 3: diagonal izq-arriba a der-abajo -->
  <line x1="30" y1="30" x2="270" y2="210" stroke="#FFD93D" stroke-width="2"/>
  
  <!-- Línea 4: diagonal der-arriba a izq-abajo -->
  <line x1="270" y1="30" x2="30" y2="210" stroke="#4A90D9" stroke-width="2"/>
  
  <!-- Línea 5: casi vertical -->
  <line x1="150" y1="20" x2="140" y2="225" stroke="#b080e0" stroke-width="2"/>
  
  <!-- Puntos de intersección marcados (10 total) -->
  <circle cx="148" cy="68" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="145" cy="172" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="150" cy="120" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="97" cy="89" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="200" cy="73" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="73" cy="165" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="225" cy="168" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="110" cy="130" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="192" cy="138" r="4" fill="#e5e5e5" opacity="0.7"/>
  <circle cx="150" cy="120" r="4" fill="#e5e5e5" opacity="0.7"/>
  
  <text x="150" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos puntos de intersección hay entre las 5 líneas?
  </text>
</svg>