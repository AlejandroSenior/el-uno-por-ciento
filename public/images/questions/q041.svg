<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q041: Triángulo equilátero n=3, contar todos los triángulos -->
  <rect width="300" height="260" fill="#12121a"/>

  <!-- Main large triangle -->
  <!-- Vertices: top (150,20), bottom-left (20,240), bottom-right (280,240) -->

  <!-- Row 1 top -->
  <!-- Small triangle (up): (150,20)-(107,90)-(193,90) -->
  <polygon points="150,20 107,90 193,90" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Row 2: 2 up + 1 down -->
  <!-- Up left: (107,90)-(64,160)-(150,160) -->
  <polygon points="107,90 64,160 150,160" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Down middle: (107,90)-(193,90)-(150,160) -->
  <polygon points="107,90 193,90 150,160" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Up right: (193,90)-(150,160)-(236,160) -->
  <polygon points="193,90 150,160 236,160" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Row 3: 3 up + 2 down -->
  <!-- Up far-left: (64,160)-(20,240)-(107,240) (approx inner) -->
  <polygon points="64,160 20,240 107,240" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Down left: (64,160)-(150,160)-(107,240) -->
  <polygon points="64,160 150,160 107,240" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Up mid: (150,160)-(107,240)-(193,240) -->
  <polygon points="150,160 107,240 193,240" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Down right: (150,160)-(236,160)-(193,240) -->
  <polygon points="150,160 236,160 193,240" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Up far-right: (236,160)-(193,240)-(280,240) -->
  <polygon points="236,160 193,240 280,240" fill="none" stroke="#fff" stroke-width="2"/>
</svg>
