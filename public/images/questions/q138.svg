<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- q138: 4 grupos de puntos - grupo B tiene exactamente 7 -->
  <rect width="320" height="220" fill="#12121a"/>
  
  <!-- Grupo A (6 puntos) -->
  <text x="50" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">A</text>
  <circle cx="30" cy="40" r="6" fill="#4ECDC4"/>
  <circle cx="55" cy="35" r="6" fill="#4ECDC4"/>
  <circle cx="70" cy="50" r="6" fill="#4ECDC4"/>
  <circle cx="35" cy="65" r="6" fill="#4ECDC4"/>
  <circle cx="60" cy="70" r="6" fill="#4ECDC4"/>
  <circle cx="45" cy="55" r="6" fill="#4ECDC4"/>
  
  <!-- Grupo B (7 puntos) -->
  <text x="200" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">B</text>
  <circle cx="180" cy="40" r="6" fill="#FF6B6B"/>
  <circle cx="205" cy="35" r="6" fill="#FF6B6B"/>
  <circle cx="220" cy="48" r="6" fill="#FF6B6B"/>
  <circle cx="185" cy="60" r="6" fill="#FF6B6B"/>
  <circle cx="210" cy="65" r="6" fill="#FF6B6B"/>
  <circle cx="195" cy="50" r="6" fill="#FF6B6B"/>
  <circle cx="225" cy="70" r="6" fill="#FF6B6B"/>
  
  <!-- Grupo C (8 puntos) -->
  <text x="50" y="110" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">C</text>
  <circle cx="25" cy="130" r="6" fill="#FFD93D"/>
  <circle cx="50" cy="125" r="6" fill="#FFD93D"/>
  <circle cx="70" cy="135" r="6" fill="#FFD93D"/>
  <circle cx="30" cy="150" r="6" fill="#FFD93D"/>
  <circle cx="55" cy="155" r="6" fill="#FFD93D"/>
  <circle cx="75" cy="160" r="6" fill="#FFD93D"/>
  <circle cx="40" cy="170" r="6" fill="#FFD93D"/>
  <circle cx="65" cy="145" r="6" fill="#FFD93D"/>
  
  <!-- Grupo D (5 puntos) -->
  <text x="200" y="110" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">D</text>
  <circle cx="185" cy="130" r="6" fill="#b080e0"/>
  <circle cx="210" cy="125" r="6" fill="#b080e0"/>
  <circle cx="225" cy="140" r="6" fill="#b080e0"/>
  <circle cx="195" cy="155" r="6" fill="#b080e0"/>
  <circle cx="215" cy="160" r="6" fill="#b080e0"/>
  
  <text x="160" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué grupo tiene exactamente 7 puntos?
  </text>
</svg>