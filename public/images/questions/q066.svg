<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- q066: Hering illusion — two straight horizontal lines appear curved -->
  <rect width="300" height="260" fill="#12121a"/>

  <!-- Radial lines emanating from center -->
  <g stroke="#444" stroke-width="1" opacity="0.7">
    <line x1="150" y1="130" x2="0" y2="0"/>
    <line x1="150" y1="130" x2="50" y2="0"/>
    <line x1="150" y1="130" x2="100" y2="0"/>
    <line x1="150" y1="130" x2="150" y2="0"/>
    <line x1="150" y1="130" x2="200" y2="0"/>
    <line x1="150" y1="130" x2="250" y2="0"/>
    <line x1="150" y1="130" x2="300" y2="0"/>
    <line x1="150" y1="130" x2="0" y2="260"/>
    <line x1="150" y1="130" x2="50" y2="260"/>
    <line x1="150" y1="130" x2="100" y2="260"/>
    <line x1="150" y1="130" x2="150" y2="260"/>
    <line x1="150" y1="130" x2="200" y2="260"/>
    <line x1="150" y1="130" x2="250" y2="260"/>
    <line x1="150" y1="130" x2="300" y2="260"/>
    <line x1="150" y1="130" x2="0" y2="80"/>
    <line x1="150" y1="130" x2="0" y2="160"/>
    <line x1="150" y1="130" x2="300" y2="80"/>
    <line x1="150" y1="130" x2="300" y2="160"/>
  </g>

  <!-- Two parallel horizontal lines (appear bent outward due to radials) -->
  <line x1="20" y1="95" x2="280" y2="95" stroke="#fbbf24" stroke-width="3"/>
  <line x1="20" y1="165" x2="280" y2="165" stroke="#fbbf24" stroke-width="3"/>

  <text x="150" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Son paralelas las dos líneas amarillas?
  </text>
</svg>
