<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <!-- q141: Dos líneas de igual longitud, una horizontal y otra en diagonal (ilusión) -->
  <rect width="320" height="180" fill="#12121a"/>
  
  <!-- Línea A (horizontal, 120px) -->
  <text x="30" y="55" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">A</text>
  <line x1="60" y1="50" x2="180" y2="50" stroke="#4ECDC4" stroke-width="3"/>
  <!-- Marcadores en extremos -->
  <line x1="60" y1="40" x2="60" y2="60" stroke="#4ECDC4" stroke-width="2"/>
  <line x1="180" y1="40" x2="180" y2="60" stroke="#4ECDC4" stroke-width="2"/>
  
  <!-- Línea B (diagonal, misma longitud 120px pero en diagonal parece más larga) -->
  <!-- longitud = sqrt(100^2 + 66^2) ≈ 120 -->
  <text x="135" y="100" font-family="sans-serif" font-size="14" fill="#e5e5e5" font-weight="bold">B</text>
  <line x1="160" y1="130" x2="260" y2="64" stroke="#FF6B6B" stroke-width="3"/>
  <!-- Marcadores en extremos -->
  <line x1="155" y1="125" x2="165" y2="135" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="255" y1="59" x2="265" y2="69" stroke="#FF6B6B" stroke-width="2"/>
  
  <text x="160" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál de las dos líneas es más larga?
  </text>
</svg>