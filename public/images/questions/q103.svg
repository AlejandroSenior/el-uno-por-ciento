<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <!-- q103: Simetría vertical -->
  <rect width="400" height="180" fill="#12121a"/>
  
  <!-- Figura A: No simétrica (flecha apuntando arriba-derecha) -->
  <g transform="translate(50,50)">
    <text x="0" y="-10" font-family="sans-serif" font-size="12" fill="#fbbf24" font-weight="bold">A</text>
    <polygon points="0,30 10,30 10,10 25,10 15,0 5,10 0,10" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  </g>
  
  <!-- Figura B: Simétrica vertical (corazón) -->
  <g transform="translate(140,50)">
    <text x="0" y="-10" font-family="sans-serif" font-size="12" fill="#fbbf24" font-weight="bold">B</text>
    <path d="M 0,10 C -5,0 -15,0 -15,8 C -15,14 0,25 0,25 C 0,25 15,14 15,8 C 15,0 5,0 0,10 Z" 
          fill="none" stroke="#e5e5e5" stroke-width="2"/>
  </g>
  
  <!-- Figura C: No simétrica (L shape) -->
  <g transform="translate(250,50)">
    <text x="0" y="-10" font-family="sans-serif" font-size="12" fill="#fbbf24" font-weight="bold">C</text>
    <path d="M 0,0 L 0,30 L 20,30 L 20,25 L 5,25 L 5,0 Z" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  </g>
  
  <!-- Figura D: No simétrica (espiral) -->
  <g transform="translate(340,50)">
    <text x="0" y="-10" font-family="sans-serif" font-size="12" fill="#fbbf24" font-weight="bold">D</text>
    <path d="M 0,15 Q 10,0 20,10 Q 15,25 0,20" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  </g>
  
  <text x="200" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál figura tiene simetría vertical?
  </text>
</svg>
