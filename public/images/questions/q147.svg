<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- q147: Figura original y 4 reflejos, solo C es el correcto reflejo horizontal -->
  <rect width="320" height="220" fill="#12121a"/>
  
  <!-- Figura original: L invertida (como una L mirando a la derecha con una cola arriba) -->
  <g transform="translate(160,15)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFD93D">Original</text>
    <polygon points="-15,10 15,10 15,50 5,50 5,20 -15,20" fill="none" stroke="#FFD93D" stroke-width="2.5"/>
    <circle cx="10" cy="15" r="3" fill="#FFD93D"/>
  </g>
  
  <!-- Línea de separación -->
  <line x1="10" y1="75" x2="310" y2="75" stroke="#333" stroke-width="1"/>
  
  <!-- A: rotada 90° (incorrecta) -->
  <g transform="translate(50,140)">
    <polygon points="-20,-15 -20,15 20,15 20,5 -10,5 -10,-15" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <circle cx="-15" cy="10" r="3" fill="#e5e5e5"/>
    <text x="0" y="45" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">A</text>
  </g>
  
  <!-- B: misma figura sin reflejar (incorrecta) -->
  <g transform="translate(130,140)">
    <polygon points="-15,-20 15,-20 15,20 5,20 5,-10 -15,-10" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <circle cx="10" cy="-15" r="3" fill="#e5e5e5"/>
    <text x="0" y="45" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">B</text>
  </g>
  
  <!-- C: reflejo horizontal correcto -->
  <g transform="translate(210,140)">
    <polygon points="15,-20 -15,-20 -15,20 -5,20 -5,-10 15,-10" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <circle cx="-10" cy="-15" r="3" fill="#e5e5e5"/>
    <text x="0" y="45" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">C</text>
  </g>
  
  <!-- D: invertida vertical (incorrecta) -->
  <g transform="translate(290,140)">
    <polygon points="-15,20 15,20 15,-20 5,-20 5,10 -15,10" fill="none" stroke="#e5e5e5" stroke-width="2"/>
    <circle cx="10" cy="15" r="3" fill="#e5e5e5"/>
    <text x="0" y="45" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b8a">D</text>
  </g>
  
  <text x="160" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuál es el reflejo horizontal de la figura original?
  </text>
</svg>