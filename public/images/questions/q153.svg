<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- q153: Balanza con equivalencias de peso. 2○ = 1□, 1□ = 3△. ¿Cuántos △ = 4○? Resp: 6 -->
  <rect width="320" height="200" fill="#12121a"/>
  
  <!-- Primera equivalencia: 2 círculos = 1 cuadrado -->
  <text x="80" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">Ecuación 1</text>
  <g transform="translate(80,60)">
    <!-- Balanza base -->
    <polygon points="0,30 -50,30 -50,25 50,25 50,30" fill="#444"/>
    <rect x="-2" y="25" width="4" height="15" fill="#666"/>
    <polygon points="0,40 -8,45 8,45" fill="#666"/>
    
    <!-- Plato izquierdo: 2 círculos -->
    <line x1="-40" y1="0" x2="-40" y2="25" stroke="#888" stroke-width="1"/>
    <circle cx="-50" cy="-5" r="10" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <circle cx="-30" cy="-5" r="10" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    
    <!-- Plato derecho: 1 cuadrado -->
    <line x1="40" y1="0" x2="40" y2="25" stroke="#888" stroke-width="1"/>
    <rect x="30" y="-15" width="20" height="20" fill="none" stroke="#FF6B6B" stroke-width="2"/>
    
    <!-- Signo = -->
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#FFD93D" font-weight="bold">=</text>
  </g>
  
  <!-- Segunda equivalencia: 1 cuadrado = 3 triángulos -->
  <text x="240" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">Ecuación 2</text>
  <g transform="translate(240,60)">
    <!-- Balanza base -->
    <polygon points="0,30 -55,30 -55,25 55,25 55,30" fill="#444"/>
    <rect x="-2" y="25" width="4" height="15" fill="#666"/>
    <polygon points="0,40 -8,45 8,45" fill="#666"/>
    
    <!-- Plato izquierdo: 1 cuadrado -->
    <line x1="-35" y1="0" x2="-35" y2="25" stroke="#888" stroke-width="1"/>
    <rect x="-45" y="-15" width="20" height="20" fill="none" stroke="#FF6B6B" stroke-width="2"/>
    
    <!-- Plato derecho: 3 triángulos -->
    <line x1="35" y1="0" x2="35" y2="25" stroke="#888" stroke-width="1"/>
    <polygon points="20,-5 12,10 28,10" fill="none" stroke="#FFD93D" stroke-width="2"/>
    <polygon points="35,-5 27,10 43,10" fill="none" stroke="#FFD93D" stroke-width="2"/>
    <polygon points="50,-5 42,10 58,10" fill="none" stroke="#FFD93D" stroke-width="2"/>
    
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#FFD93D" font-weight="bold">=</text>
  </g>
  
  <!-- Pregunta visual: 4 círculos = ? triángulos -->
  <g transform="translate(160,150)">
    <circle cx="-60" cy="0" r="10" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <circle cx="-38" cy="0" r="10" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <circle cx="-16" cy="0" r="10" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <circle cx="6" cy="0" r="10" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <text x="28" y="6" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#e5e5e5" font-weight="bold">=</text>
    <text x="60" y="8" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#FFD93D" font-weight="bold">?</text>
    <polygon points="82,5 74,15 90,15" fill="none" stroke="#FFD93D" stroke-width="2"/>
  </g>
  
  <text x="160" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos triángulos equilibran 4 círculos?
  </text>
</svg>