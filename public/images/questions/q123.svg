<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <!-- q123: Secuencia de dominós -->
  <rect width="400" height="160" fill="#12121a"/>
  
  <!-- Dominó 1: [1|2] -->
  <g transform="translate(30,50)">
    <rect x="0" y="0" width="35" height="70" fill="#e5e5e5" stroke="#333" stroke-width="2" rx="3"/>
    <line x1="0" y1="35" x2="35" y2="35" stroke="#333" stroke-width="1.5"/>
    <circle cx="17.5" cy="17.5" r="3" fill="#333"/>
    <circle cx="12" cy="52" r="3" fill="#333"/>
    <circle cx="23" cy="52" r="3" fill="#333"/>
    <text x="17.5" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6b8a">[1|2]</text>
  </g>
  
  <!-- Dominó 2: [2|3] -->
  <g transform="translate(95,50)">
    <rect x="0" y="0" width="35" height="70" fill="#e5e5e5" stroke="#333" stroke-width="2" rx="3"/>
    <line x1="0" y1="35" x2="35" y2="35" stroke="#333" stroke-width="1.5"/>
    <circle cx="12" cy="17.5" r="3" fill="#333"/>
    <circle cx="23" cy="17.5" r="3" fill="#333"/>
    <circle cx="17.5" cy="44" r="3" fill="#333"/>
    <circle cx="17.5" cy="52" r="3" fill="#333"/>
    <circle cx="17.5" cy="60" r="3" fill="#333"/>
    <text x="17.5" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6b8a">[2|3]</text>
  </g>
  
  <!-- Dominó 3: [3|4] -->
  <g transform="translate(160,50)">
    <rect x="0" y="0" width="35" height="70" fill="#e5e5e5" stroke="#333" stroke-width="2" rx="3"/>
    <line x1="0" y1="35" x2="35" y2="35" stroke="#333" stroke-width="1.5"/>
    <circle cx="17.5" cy="13" r="3" fill="#333"/>
    <circle cx="17.5" cy="22" r="3" fill="#333"/>
    <circle cx="17.5" cy="31" r="3" fill="#333"/>
    <circle cx="10" cy="48" r="3" fill="#333"/>
    <circle cx="25" cy="48" r="3" fill="#333"/>
    <circle cx="10" cy="62" r="3" fill="#333"/>
    <circle cx="25" cy="62" r="3" fill="#333"/>
    <text x="17.5" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6b8a">[3|4]</text>
  </g>
  
  <!-- Dominó 4: ? -->
  <g transform="translate(225,50)">
    <rect x="0" y="0" width="35" height="70" fill="#e5e5e5" stroke="#fbbf24" stroke-width="2.5" rx="3"/>
    <text x="17.5" y="45" text-anchor="middle" font-family="Impact,Arial Narrow,sans-serif" font-size="36" fill="#fbbf24">?</text>
    <text x="17.5" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6b8a">[?|?]</text>
  </g>
  
  <!-- Flechas -->
  <text x="73" y="90" font-size="14" fill="#6b6b8a">→</text>
  <text x="138" y="90" font-size="14" fill="#6b6b8a">→</text>
  <text x="203" y="90" font-size="14" fill="#6b6b8a">→</text>
  
  <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué dominó sigue en la secuencia?
  </text>
</svg>
