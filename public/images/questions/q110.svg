<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <!-- q110: Matriz 3x3 con patrón lógico -->
  <rect width="280" height="280" fill="#12121a"/>
  
  <!-- Grid 3x3 -->
  <g stroke="#6b6b8a" stroke-width="1.5">
    <rect x="40" y="30" width="200" height="200" fill="none" stroke-width="2"/>
    <line x1="106.67" y1="30" x2="106.67" y2="230"/>
    <line x1="173.33" y1="30" x2="173.33" y2="230"/>
    <line x1="40" y1="96.67" x2="240" y2="96.67"/>
    <line x1="40" y1="163.33" x2="240" y2="163.33"/>
  </g>
  
  <!-- Patrón: número de círculos aumenta por fila, posición rota por columna -->
  <!-- Fila 1: 1, 2, 3 círculos -->
  <circle cx="73" cy="63" r="8" fill="#4ECDC4"/>
  
  <circle cx="133" cy="63" r="8" fill="#4ECDC4"/>
  <circle cx="147" cy="63" r="8" fill="#4ECDC4"/>
  
  <circle cx="193" cy="53" r="8" fill="#4ECDC4"/>
  <circle cx="207" cy="53" r="8" fill="#4ECDC4"/>
  <circle cx="207" cy="73" r="8" fill="#4ECDC4"/>
  
  <!-- Fila 2: 2, 3, 4 círculos -->
  <circle cx="60" cy="130" r="8" fill="#FFD93D"/>
  <circle cx="80" cy="130" r="8" fill="#FFD93D"/>
  
  <circle cx="133" cy="120" r="8" fill="#FFD93D"/>
  <circle cx="147" cy="120" r="8" fill="#FFD93D"/>
  <circle cx="140" cy="140" r="8" fill="#FFD93D"/>
  
  <circle cx="197" cy="123" r="8" fill="#FFD93D"/>
  <circle cx="213" cy="123" r="8" fill="#FFD93D"/>
  <circle cx="197" cy="143" r="8" fill="#FFD93D"/>
  <circle cx="213" cy="143" r="8" fill="#FFD93D"/>
  
  <!-- Fila 3: 3, 4, ? (debe ser 5) -->
  <circle cx="60" cy="187" r="8" fill="#FF6B6B"/>
  <circle cx="80" cy="187" r="8" fill="#FF6B6B"/>
  <circle cx="70" cy="207" r="8" fill="#FF6B6B"/>
  
  <circle cx="127" cy="190" r="8" fill="#FF6B6B"/>
  <circle cx="153" cy="190" r="8" fill="#FF6B6B"/>
  <circle cx="127" cy="210" r="8" fill="#FF6B6B"/>
  <circle cx="153" cy="210" r="8" fill="#FF6B6B"/>
  
  <!-- Celda con ? -->
  <text x="207" y="205" text-anchor="middle" font-family="Impact,Arial Narrow,sans-serif" font-size="40" fill="#fbbf24">?</text>
  
  <text x="140" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos círculos van en la celda marcada con "?"?
  </text>
</svg>
