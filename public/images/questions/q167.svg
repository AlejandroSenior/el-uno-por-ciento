<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" width="320" height="250">
  <!-- q167: Desarrollo del cubo con caras coloreadas. ¿Qué color queda opuesto al rojo? = Verde -->
  <rect width="320" height="250" fill="#12121a"/>
  
  <!-- Desarrollo del cubo en cruz -->
  <g transform="translate(160,110)">
    <!-- Cara arriba: Azul -->
    <rect x="-25" y="-100" width="50" height="50" fill="#4A90D9" opacity="0.5" stroke="#4A90D9" stroke-width="2"/>
    <text x="0" y="-70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e5e5e5">Azul</text>
    
    <!-- Cara izquierda: Amarillo -->
    <rect x="-75" y="-50" width="50" height="50" fill="#FFD93D" opacity="0.4" stroke="#FFD93D" stroke-width="2"/>
    <text x="-50" y="-18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#12121a">Amarillo</text>
    
    <!-- Cara frontal: Rojo -->
    <rect x="-25" y="-50" width="50" height="50" fill="#FF6B6B" opacity="0.5" stroke="#FF6B6B" stroke-width="2"/>
    <text x="0" y="-18" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e5e5e5" font-weight="bold">Rojo</text>
    
    <!-- Cara derecha: Morado -->
    <rect x="25" y="-50" width="50" height="50" fill="#b080e0" opacity="0.5" stroke="#b080e0" stroke-width="2"/>
    <text x="50" y="-18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e5e5e5">Morado</text>
    
    <!-- Cara abajo: Verde -->
    <rect x="-25" y="0" width="50" height="50" fill="#4ECDC4" opacity="0.5" stroke="#4ECDC4" stroke-width="2"/>
    <text x="0" y="32" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e5e5e5">Verde</text>
    
    <!-- Cara trasera (opuesta a rojo): Naranja -->
    <rect x="-25" y="50" width="50" height="50" fill="#FF9F43" opacity="0.5" stroke="#FF9F43" stroke-width="2"/>
    <text x="0" y="82" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#12121a">Naranja</text>
    
    <!-- Líneas de doblez -->
    <line x1="-25" y1="-50" x2="25" y2="-50" stroke="#666" stroke-dasharray="4,3" stroke-width="1"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#666" stroke-dasharray="4,3" stroke-width="1"/>
    <line x1="-25" y1="50" x2="25" y2="50" stroke="#666" stroke-dasharray="4,3" stroke-width="1"/>
    <line x1="-25" y1="-50" x2="-25" y2="0" stroke="#666" stroke-dasharray="4,3" stroke-width="1"/>
    <line x1="25" y1="-50" x2="25" y2="0" stroke="#666" stroke-dasharray="4,3" stroke-width="1"/>
  </g>
  
  <text x="160" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    Si doblas el cubo, ¿qué color queda opuesto al rojo?
  </text>
</svg>