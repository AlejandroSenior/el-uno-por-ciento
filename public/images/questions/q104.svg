<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <!-- q104: Gráfico circular - fracción coloreada -->
  <rect width="280" height="240" fill="#12121a"/>
  
  <g transform="translate(140,110)">
    <!-- Círculo completo (borde) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#6b6b8a" stroke-width="2"/>
    
    <!-- Sección coloreada: 3/8 del círculo (135 grados) -->
    <!-- Comenzando desde las 12 en punto, 135° hacia la derecha -->
    <path d="M 0,-80 A 80,80 0 0,1 56.57,56.57 L 0,0 Z" fill="#4ECDC4" opacity="0.8"/>
    
    <!-- Líneas divisorias cada 45° -->
    <line x1="0" y1="-80" x2="0" y2="-90" stroke="#e5e5e5" stroke-width="2"/>
    <line x1="56.57" y1="-56.57" x2="63.64" y2="-63.64" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="80" y1="0" x2="90" y2="0" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="56.57" y1="56.57" x2="63.64" y2="63.64" stroke="#e5e5e5" stroke-width="2"/>
    <line x1="0" y1="80" x2="0" y2="90" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="-56.57" y1="56.57" x2="-63.64" y2="63.64" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="-80" y1="0" x2="-90" y2="0" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="-56.57" y1="-56.57" x2="-63.64" y2="-63.64" stroke="#e5e5e5" stroke-width="1.5"/>
  </g>
  
  <text x="140" y="225" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Qué fracción del círculo está coloreada?
  </text>
</svg>
