<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <!-- q173: Triángulo equilátero dividido en 4 filas de triángulos pequeños. ¿Cuántos triángulos hay en total? = 27 -->
  <rect width="320" height="260" fill="#12121a"/>
  
  <g transform="translate(160,20)">
    <!-- Triángulo principal dividido en 4 filas (16 triángulos pequeños) -->
    <!-- Cada fila tiene ancho creciente. Unidad = 30px de lado -->
    <!-- Vértices del triángulo grande: (0,0) arriba, (-120,208) abajo-izq, (120,208) abajo-der -->
    
    <!-- Líneas horizontales -->
    <line x1="0" y1="0" x2="0" y2="0" stroke="#4ECDC4" stroke-width="1.5"/>
    <!-- Row boundaries -->
    <line x1="-30" y1="52" x2="30" y2="52" stroke="#4ECDC4" stroke-width="1.5"/>
    <line x1="-60" y1="104" x2="60" y2="104" stroke="#4ECDC4" stroke-width="1.5"/>
    <line x1="-90" y1="156" x2="90" y2="156" stroke="#4ECDC4" stroke-width="1.5"/>
    
    <!-- Outer triangle -->
    <line x1="0" y1="0" x2="-120" y2="208" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="0" y1="0" x2="120" y2="208" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="-120" y1="208" x2="120" y2="208" stroke="#4ECDC4" stroke-width="2"/>
    
    <!-- Internal horizontal lines -->
    <line x1="-30" y1="52" x2="30" y2="52" stroke="#4ECDC4" stroke-width="1.5"/>
    <line x1="-60" y1="104" x2="60" y2="104" stroke="#4ECDC4" stroke-width="1.5"/>
    <line x1="-90" y1="156" x2="90" y2="156" stroke="#4ECDC4" stroke-width="1.5"/>
    
    <!-- Left-leaning lines (parallel to right side) -->
    <line x1="-30" y1="52" x2="30" y2="52" stroke="#4ECDC4" stroke-width="1.5"/>
    <!-- From row1-left down-right -->
    <line x1="-30" y1="52" x2="90" y2="208" stroke="#4ECDC4" stroke-width="1.5"/>
    <!-- From row2-left down-right -->
    <line x1="-60" y1="104" x2="60" y2="208" stroke="#4ECDC4" stroke-width="1.5"/>
    <!-- From row3-left down-right -->
    <line x1="-90" y1="156" x2="30" y2="208" stroke="#4ECDC4" stroke-width="1.5"/>
    <!-- From top down-right to row1 -->
    <line x1="0" y1="0" x2="120" y2="208" stroke="#4ECDC4" stroke-width="1.5"/>
    
    <!-- Right-leaning lines (parallel to left side) -->
    <line x1="30" y1="52" x2="-90" y2="208" stroke="#4ECDC4" stroke-width="1.5"/>
    <line x1="60" y1="104" x2="-60" y2="208" stroke="#4ECDC4" stroke-width="1.5"/>
    <line x1="90" y1="156" x2="-30" y2="208" stroke="#4ECDC4" stroke-width="1.5"/>
  </g>
  
  <text x="160" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿Cuántos triángulos de cualquier tamaño hay en la figura?
  </text>
</svg>