<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">
  <!-- q107: Secuencia de rotación 90° -->
  <rect width="420" height="140" fill="#12121a"/>
  
  <!-- Paso 1: Flecha arriba -->
  <g transform="translate(50,60)">
    <polygon points="0,-25 -10,-10 -4,-10 -4,15 4,15 4,-10 10,-10" fill="#e5e5e5"/>
    <text x="0" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6b8a">Paso 1</text>
  </g>
  
  <!-- Paso 2: Flecha derecha (90° CW) -->
  <g transform="translate(130,60)">
    <polygon points="25,0 10,-10 10,-4 -15,-4 -15,4 10,4 10,10" fill="#e5e5e5"/>
    <text x="0" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6b8a">Paso 2</text>
  </g>
  
  <!-- Paso 3: Flecha abajo (180°) -->
  <g transform="translate(210,60)">
    <polygon points="0,25 -10,10 -4,10 -4,-15 4,-15 4,10 10,10" fill="#e5e5e5"/>
    <text x="0" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6b8a">Paso 3</text>
  </g>
  
  <!-- Paso 4: Interrogación -->
  <g transform="translate(290,60)">
    <text x="0" y="10" text-anchor="middle" font-family="Impact,Arial Narrow,sans-serif" font-size="42" fill="#fbbf24">?</text>
    <text x="0" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6b8a">Paso 4</text>
  </g>
  
  <!-- Flechas de transición -->
  <text x="90" y="65" font-size="16" fill="#6b6b8a">→</text>
  <text x="170" y="65" font-size="16" fill="#6b6b8a">→</text>
  <text x="250" y="65" font-size="16" fill="#6b6b8a">→</text>
  
  <text x="210" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b8a">
    ¿En qué dirección apuntará la flecha en el paso 4?
  </text>
</svg>
